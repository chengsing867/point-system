    // 渲染积分规则配置
    function renderRulesSettings() {
      const container = document.getElementById('rulesSettings');

      // 按照 ELEMENTS 的顺序显示默认项目，然后显示自定义项目
      const defaultTypes = ELEMENTS.map(e => e.type);
      const customRules = state.rules.filter(r => !defaultTypes.includes(r.type));

      // 构建排序后的规则列表：先默认项目（按ELEMENTS顺序），再自定义项目
      const sortedRules = [];
      ELEMENTS.forEach(defaultEl => {
        const custom = state.rules.find(r => r.type === defaultEl.type);
        sortedRules.push(custom || defaultEl);
      });
      sortedRules.push(...customRules);

      let html = '<div class="rules-settings-list">';
      html += '<div class="rules-settings-info" style="font-size:11px;color:#6b7280;margin-bottom:10px;">示例：1分/个 表示每1个得1分，50分/批 表示每批得50分</div>';

      sortedRules.forEach((rule, sortedIndex) => {
        // 找到该规则在 state.rules 中的实际索引
        const actualIndex = state.rules.findIndex(r => r.type === rule.type);
        const isDefault = defaultTypes.includes(rule.type);

        // 计算显示格式：pointsPerUnit = 0时显示 0分/1个；>=1时显示 X分/Y个；小于1且大于0时转换为 1分/N个
        let displayPoints, displayDivisor;
        if (rule.pointsPerUnit <= 0) {
          displayPoints = 0;
          displayDivisor = 1;
        } else if (rule.pointsPerUnit >= 1) {
          displayPoints = rule.pointsPerUnit;
          displayDivisor = 1;
        } else {
          displayPoints = 1;
          displayDivisor = Math.round(1 / rule.pointsPerUnit);
        }

        // 使用 sortedIndex 作为 onchange 调用中的索引，并从 sortedRules 中获取实际值
        html += `
          <div class="rule-settings-item">
            <div class="rule-settings-header">
              <input type="text" class="rule-name-input" value="${rule.name}"
                placeholder="项目名称" onchange="updateRuleNameByType('${rule.type}', this.value)">
              ${!isDefault ? `<button class="rule-delete-btn" onclick="deleteRuleByType('${rule.type}')">🗑️</button>` : ''}
            </div>
            <div class="rule-settings-body">
              <div class="rule-input-row">
                <input type="number" min="0" value="${displayPoints}" class="rule-points-input"
                  oninput="liveUpdateRulePoints('${rule.type}', this.value, this.parentNode.querySelector('.rule-unit-qty-input').value)">
                <span class="rule-label">分/</span>
                <input type="number" min="1" value="${displayDivisor}" class="rule-unit-qty-input"
                  oninput="liveUpdateRulePoints('${rule.type}', this.parentNode.querySelector('.rule-points-input').value, this.value)">
                <input type="text" value="${rule.unit}" class="rule-unit-input"
                  placeholder="个/批/人" onchange="updateRuleUnitByType('${rule.type}', this.value)">
              </div>
              <div class="rule-preview" data-type="${rule.type}">预览：${displayPoints}分/${displayDivisor}${rule.unit}</div>
            </div>
          </div>
        `;
      });

      html += `
        <button class="add-rule-btn" onclick="addNewRule()">➕ 添加新项目</button>
      `;
      html += '</div>';
      container.innerHTML = html;
    }

    // 更新项目名称
    function updateRuleName(index, value) {
      state.rules[index].name = value;
      saveRules();
      renderRulesSettings();
    }

    // 实时更新积分规则（通过 type 查找，支持预览同步更新）
    function liveUpdateRulePoints(type, points, divisor) {
      const pointsVal = parseFloat(points);
      let divisorVal = parseInt(divisor);
      if (isNaN(divisorVal) || divisorVal < 1) divisorVal = 1;
      const actualPoints = isNaN(pointsVal) ? 0 : pointsVal;

      const rule = state.rules.find(r => r.type === type);
      if (rule) {
        rule.pointsPerUnit = actualPoints / divisorVal;
      } else {
        // 不在 state.rules 中，加入（避免渲染时因 state.rules 缺项失效）
        const defaultEl = ELEMENTS.find(e => e.type === type);
        if (defaultEl) {
          state.rules.push({
            type: defaultEl.type,
            name: defaultEl.name,
            unit: defaultEl.unit,
            pointsPerUnit: actualPoints / divisorVal,
            maxPoints: defaultEl.maxPoints || 0
          });
        }
      }
      saveRules();

      // 实时更新预览文本
      const preview = document.querySelector(`.rule-preview[data-type="${type}"]`);
      const unitInput = preview ? preview.parentNode.querySelector('.rule-unit-input') : null;
      const unitVal = unitInput ? unitInput.value : (rule ? rule.unit : '个');
      if (preview) {
        if (actualPoints === 0) {
          preview.textContent = `预览：0分/1${unitVal}`;
        } else if (actualPoints >= 1) {
          preview.textContent = `预览：${actualPoints}分/1${unitVal}`;
        } else {
          const dp = Math.round(1 / actualPoints);
          preview.textContent = `预览：1分/${dp}${unitVal}`;
        }
      }
    }

    // 通过 type 更新项目名称
    function updateRuleNameByType(type, value) {
      const rule = state.rules.find(r => r.type === type);
      if (rule) {
        rule.name = value;
      } else {
        const defaultEl = ELEMENTS.find(e => e.type === type);
        if (defaultEl) {
          state.rules.push({
            type: defaultEl.type, name: value, unit: defaultEl.unit,
            pointsPerUnit: defaultEl.pointsPerUnit, maxPoints: defaultEl.maxPoints || 0
          });
        }
      }
      saveRules();
      renderRulesSettings();
    }

    // 通过 type 更新单位
    function updateRuleUnitByType(type, value) {
      const rule = state.rules.find(r => r.type === type);
      if (rule) {
        rule.unit = value;
      } else {
        const defaultEl = ELEMENTS.find(e => e.type === type);
        if (defaultEl) {
          state.rules.push({
            type: defaultEl.type, name: defaultEl.name, unit: value,
            pointsPerUnit: defaultEl.pointsPerUnit, maxPoints: defaultEl.maxPoints || 0
          });
        }
      }
      saveRules();
      renderRulesSettings();
    }

    // 通过 type 删除规则
    function deleteRuleByType(type) {
      const idx = state.rules.findIndex(r => r.type === type);
      if (idx >= 0) {
        state.rules.splice(idx, 1);
        saveRules();
        renderRulesSettings();
        showToast('已删除', 'success');
      }
    }

    // 更新积分规则（点数和除数）- 保留旧函数做兼容
    function updateRulePoints(index, points, divisor) {
      const pointsVal = parseFloat(points);
      const divisorVal = parseInt(divisor);
      if (isNaN(divisorVal) || divisorVal < 1) {
        divisorVal = 1;
      }
      if (isNaN(pointsVal)) {
        pointsVal = 0;
      }
      state.rules[index].pointsPerUnit = pointsVal / divisorVal;
      saveRules();
      renderRulesSettings();
      showToast('规则已更新', 'success');
      if (document.getElementById('pointsColumn')) {
        renderPointsColumn();
      }
    }

    // 更新单位
    function updateRuleUnit(index, value) {
      state.rules[index].unit = value;
      saveRules();
      renderRulesSettings();
    }

    // 导出数据
    function exportData(type) {
      const now = new Date();
      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      let csvContent = '';
      const members = getCurrentShopMembers();
      const shopName = state.currentShop ? state.currentShop.name : '';
      const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
      const dateHeaders = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        const dateStr = `${d.getMonth() + 1}/${d.getDate()}`;
        dateHeaders.push(dateStr);
      }

      if (type === 'week') {
        // 本周数据 - 按门店+人员+类型分组
        csvContent += `门店:${shopName || '未指定'},导出时间:${now.toLocaleString('zh-CN')}\n`;

            const values = [];

            for (let i = 0; i < 7; i++) {
              const day = new Date(monday);
              day.setDate(monday.getDate() + i);
              const dayStr = day.toDateString();
              const val = state.records.filter(r =>
                r.userId === member.id &&

                new Date(r.date).toDateString() === dayStr
              ).reduce((sum, r) => sum + r.value, 0);
              values.push(val);
              total += val;
            }

            csvContent += `${member.name},${itemType},` + values.join(',') + `,${total}\n`;
          });
        });

        csvContent += '\n';

        // 第二部分：目标达成汇总
        csvContent += '【目标与达成情况】\n';
        csvContent += '姓名,项目,目标,本周达成,达成率\n';
        members.forEach(member => {
          const targets = getUserTargets(member.id);
          ['订单', '邀约', '门票'].forEach(itemType => {
            const targetKey = itemType === '订单' ? 'orderTarget' : itemType === '邀约' ? 'inviteTarget' : 'ticketTarget';
            const achieveKey = itemType === '订单' ? 'orderAchieve' : itemType === '邀约' ? 'inviteAchieve' : 'ticketAchieve';
            const target = targets[targetKey] || 0;
            const achieve = targets[achieveKey] || 0;
            const rate = target > 0 ? Math.round((achieve / target) * 100) + '%' : '-';
            csvContent += `${member.name},${itemType},${target},${achieve},${rate}\n`;
          });
        });

        csvContent += '\n';

        // 第三部分：本周各项目每日积分汇总
        csvContent += '【本周各项目每日积分汇总】\n';
        csvContent += '姓名,项目,' + dateHeaders.join(',') + ',本周合计\n';

        members.forEach(member => {
          ['订单', '邀约', '门票'].forEach(itemType => {
            const typeKey = itemType === '订单' ? 'order' : itemType === '邀约' ? 'invite' : 'ticket';
            const values = [];
            let total = 0;

            for (let i = 0; i < 7; i++) {

              ).reduce((sum, r) => sum + r.points, 0);
              values.push(val);
              total += val;
            }

            csvContent += `${member.name},${itemType},` + values.join(',') + `,${total}\n`;
          });
        });

      } else {
        // 全部数据 - 按时间排序的详细记录
        csvContent += `门店:${shopName || '未指定'},导出时间:${now.toLocaleString('zh-CN')}\n`;
        csvContent += '\n';

        // 按用户分组，每个用户的记录按时间排序
        csvContent += '【全部记录明细】\n';
        csvContent += '日期,时间,姓名,项目,数量,积分\n';

        const sortedRecords = [...state.records]
          .filter(r => members.find(m => m.id === r.userId))
          .sort((a, b) => new Date(a.date) - new Date(b.date));

        sortedRecords.forEach(record => {
          const member = members.find(m => m.id === record.userId);
          const memberName = member ? member.name : '未知';
          const date = new Date(record.date);
          const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

          const rules = state.rules || ELEMENTS;
          const element = rules.find(el => el.type === record.elementType);
          const elementName = element ? element.name : record.elementType;

          csvContent += `${dateStr},${timeStr},${memberName},${elementName},${record.value},${record.points}\n`;
        });

        csvContent += '\n';

        // 目标达成数据
        csvContent += '【目标与达成情况】\n';
        csvContent += '姓名,项目,目标,达成,达成率\n';
        members.forEach(member => {
          const targets = getUserTargets(member.id);
          ['订单', '邀约', '门票'].forEach(itemType => {
            const targetKey = itemType === '订单' ? 'orderTarget' : itemType === '邀约' ? 'inviteTarget' : 'ticketTarget';
            const achieveKey = itemType === '订单' ? 'orderAchieve' : itemType === '邀约' ? 'inviteAchieve' : 'ticketAchieve';
            const target = targets[targetKey] || 0;
            const achieve = targets[achieveKey] || 0;
            const rate = target > 0 ? Math.round((achieve / target) * 100) + '%' : '-';
            csvContent += `${member.name},${itemType},${target},${achieve},${rate}\n`;
          });
        });

        csvContent += '\n';

        // 人员汇总
        csvContent += '【人员信息汇总】\n';
        csvContent += '姓名,手机,订单目标,邀约目标,门票目标\n';
        members.forEach(member => {
          csvContent += `${member.name},${member.phone},${member.orderTarget || 0},${member.inviteTarget || 0},${member.ticketTarget || 0}\n`;
        });
      }

      // 下载文件
      const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      const fileName = type === 'week'
        ? `${shopName || '门店'}_本周数据_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}.csv`
        : `${shopName || '门店'}_全部数据_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}.csv`;
      link.setAttribute('download', fileName);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      showToast('数据导出成功', 'success');
    }

    function addMember() {
      if (!state.adminShopId) {
        showToast('请先选择门店', 'error');
        return;
      }
      
      const name = document.getElementById('newMemberName').value.trim();
      const phone = document.getElementById('newMemberPhone').value.trim();
      if (!name) { showToast('请输入姓名', 'error'); return; }
      if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showToast('请输入正确的11位手机号', 'error'); return; }

      const shop = state.shops.find(s => s.id === state.adminShopId);
      if (!shop) {
        showToast('门店不存在', 'error');
        return;
      }
      
      if (!shop.members) shop.members = [];
      if (shop.members.some(m => m.phone === phone)) {
        showToast('该手机号已在当前门店存在', 'error');
        return;
      }

      const newMember = {
        id: 'member_' + Date.now(),
        name: name,
        phone: phone,
        orderTarget: 0,
        inviteTarget: 0,
        ticketTarget: 0,
        createdAt: new Date().toISOString()
      };
      
      shop.members.push(newMember);
      saveData();
      // 同步更新 state.currentShop
      if (state.currentShop && state.currentShop.id === shop.id) {
        state.currentShop = shop;
        safeSetItem('point_current_shop', JSON.stringify(state.currentShop));
      }
      document.getElementById('newMemberName').value = '';
      document.getElementById('newMemberPhone').value = '';
      renderMemberList();
      renderShopList();
      // 显示确认按钮
      document.getElementById('memberConfirmBar').style.display = 'block';
      // 实时刷新主页视图
      renderTeamSummaryColumn();
      updateBanner();
      showToast('人员添加成功', 'success');
    }

    function deleteMember(memberId) {
      if (!confirm('确定要删除该人员吗？')) return;
      if (!state.adminShopId) return;
      
      const shop = state.shops.find(s => s.id === state.adminShopId);
      if (!shop) return;
      
      shop.members = shop.members.filter(m => m.id !== memberId);
      state.records = state.records.filter(r => r.memberId !== memberId);
      saveData();
      // 同步更新 state.currentShop
      if (state.currentShop && state.currentShop.id === shop.id) {
        state.currentShop = shop;
        safeSetItem('point_current_shop', JSON.stringify(state.currentShop));
      }
      renderMemberList();
      renderShopList();
      // 显示确认按钮
      document.getElementById('memberConfirmBar').style.display = 'block';
      // 实时刷新主页视图
      renderTeamSummaryColumn();
      updateBanner();
      showToast('人员已删除', 'success');
    }

    // 全局错误捕获，防止白屏
    window.addEventListener('error', function(e) {
      console.error('全局错误:', e.message, e.filename, e.lineno);
      // 确保登录页可见
      const loginPage = document.getElementById('loginPage');
      if (loginPage && loginPage.style.display === 'none' && !document.getElementById('appContainer').style.display.includes('block')) {
        loginPage.style.display = 'flex';
        loginPage.classList.add('active');
      }
      return false;
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('未处理的 Promise 错误:', e.reason);
      return false;
    });

    init();
  </script>
</body>
</html>
