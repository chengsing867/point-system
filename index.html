<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>积分统计系统</title>
  <style>
    :root {
      --primary: #1a365d;
      --primary-light: #2d4a7c;
      --secondary: #d4a574;
      --secondary-light: #e8c9a8;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --success: #10b981;
      --error: #ef4444;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --shadow: 0 4px 20px rgba(26, 54, 93, 0.1);
      --shadow-hover: 0 8px 30px rgba(26, 54, 93, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes appEnter {
      from { opacity: 0; transform: scale(0.96) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes loginFadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(1.05); }
    }

    .login-page.fading-out {
      animation: loginFadeOut 0.4s ease-in forwards;
    }

    .app-container.entering {
      animation: appEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes shine {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .page { display: none; animation: fadeIn 0.4s ease-out; }
    .page.active { display: block; }

    /* 登录页 */
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-hover);
      animation: slideUp 0.6s ease-out;
      margin: 0 auto;
    }

    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    .login-logo p { color: var(--text-secondary); font-size: 14px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 8px; }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
    }

    .code-input-group { display: flex; gap: 12px; }
    .code-input-group input { flex: 1; }

    .code-btn {
      padding: 14px 20px;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .code-btn:hover { background: var(--secondary-light); color: var(--primary); }
    .code-btn:disabled { background: #d1d5db; cursor: not-allowed; }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26, 54, 93, 0.3); }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }

    /* 主应用 */
    .app-container { min-height: 100vh; padding-bottom: 100px; }

    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      padding: 20px;
      color: white;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-info { display: flex; align-items: center; gap: 12px; }

    .user-avatar {
      width: 44px;
      height: 44px;
      background: var(--secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
    }

    .user-details h3 { font-size: 16px; font-weight: 600; }
    .user-details p { font-size: 12px; opacity: 0.8; }

    .header-actions { display: flex; gap: 8px; }

    .header-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .header-btn:hover { background: rgba(255,255,255,0.3); }

    .header-btn.logout-btn {
      background: rgba(220, 53, 69, 0.85);
    }

    .header-btn.logout-btn:hover {
      background: rgba(200, 35, 51, 0.95);
    }

    /* 标题区域 */
    .title-section {
      text-align: center;
      margin-bottom: 16px;
      position: relative;
    }

    .main-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: color 0.2s;
    }

    .main-title:hover {
      color: var(--secondary);
    }

    .title-input {
      width: 100%;
      max-width: 300px;
      padding: 10px 16px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--secondary);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: white;
    }

    /* 积分排行榜 */
    .ranking-section {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .ranking-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .ranking-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
      max-height: 320px;
      overflow-y: auto;
      justify-content: center;
    }

    /* 人数较少时（≤3人）也保持每行3个的固定布局 */
    .ranking-list.few-items {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      justify-content: center;
    }
    .ranking-list.few-items .ranking-item {
      min-width: 0;
      max-width: none;
    }

    /* 人数较多时（≥4人）固定每行3个 */
    .ranking-list.grid-items {
      grid-template-columns: repeat(3, 1fr);
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #f8f9fa;
      border-radius: 12px;
      font-size: 13px;
      transition: all 0.2s;
      min-width: 0;
    }

    .ranking-item.current {
      background: rgba(212, 165, 116, 0.15);
      border: 1px solid var(--secondary);
    }

    /* 名次色块 */
    .ranking-item .rank-block {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    /* 第1名：金色 */
    .ranking-item .rank-block.rank-1 {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      box-shadow: 0 2px 6px rgba(255, 165, 0, 0.4);
    }

    /* 第2名：银色 */
    .ranking-item .rank-block.rank-2 {
      background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
      box-shadow: 0 2px 6px rgba(169, 169, 169, 0.4);
    }

    /* 第3名：铜色 */
    .ranking-item .rank-block.rank-3 {
      background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%);
      box-shadow: 0 2px 6px rgba(184, 115, 51, 0.4);
    }

    /* 第4名及以后：统一蓝灰色 */
    .ranking-item .rank-block.rank-other {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
    }

    .ranking-item .name {
      flex: 1;
      font-weight: 500;
      color: var(--text);
    }

    .ranking-item .points {
      font-weight: 700;
      color: var(--secondary);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* 总积分展示 */
    .total-banner {
      background: linear-gradient(135deg, var(--secondary) 0%, #c49660 100%);
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .total-banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shine 3s linear infinite;
    }

    .total-banner .label { font-size: 13px; opacity: 0.9; margin-bottom: 4px; }
    .total-banner .value { font-size: 36px; font-weight: 700; }
    .total-banner .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }

    /* 段标签 */
    .section-tabs {
      display: flex;
      background: var(--card-bg);
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .section-tab {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .section-tab.active {
      color: var(--primary);
      border-bottom-color: var(--secondary);
      font-weight: 600;
    }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* 表格样式 */
    .points-table {
      width: 100%;
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border-collapse: collapse;
    }

    .points-table th,
    .points-table td {
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      border: 1px solid #e5e7eb;
    }

    .points-table th {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      font-weight: 600;
      font-size: 12px;
    }

    .points-table th .sub {
      display: block;
      font-size: 10px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 2px;
    }

    .points-table tr.header-row td {
      background: #f3f4f6;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
    }

    .points-table tr.day-row td {
      background: rgba(26, 54, 93, 0.05);
      color: var(--primary);
      font-weight: 600;
    }

    .points-table td.name {
      text-align: left;
      font-weight: 500;
      background: rgba(212, 165, 116, 0.05);
    }

    .points-table td.current-user {
      background: rgba(212, 165, 116, 0.15);
      font-weight: 600;
    }

    .points-table td.total {
      background: var(--primary);
      color: white;
      font-weight: 700;
    }

    .points-table input {
      width: 60px;
      padding: 6px 4px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      outline: none;
    }

    .points-table input:focus { border-color: var(--secondary); }

    .points-table .value-cell { color: var(--text-secondary); font-size: 12px; }

    .day-separator {
      background: var(--primary);
      color: white;
      font-weight: 600;
      text-align: left !important;
      padding: 8px 12px !important;
      font-size: 13px;
    }

    /* 双栏布局 */
    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .column-card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .column-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }

    .column-header.gold { background: linear-gradient(135deg, var(--secondary) 0%, #c49660 100%); }

    .column-content {
      padding: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* 目标达成表格 */
    .target-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .target-table th,
    .target-table td {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid #f3f4f6;
    }

    .target-table th {
      background: #f9fafb;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 11px;
    }

    .target-table td { color: var(--text); font-size: 13px; }
    .target-table td:last-child { font-weight: 600; }

    .target-table .rate { color: var(--secondary); font-weight: 700; }
    .target-table .rate.low { color: var(--error); }
    .target-table .rate.mid { color: #f59e0b; }
    .target-table .rate.high { color: var(--success); }

    .target-table input {
      width: 50px;
      padding: 4px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }

    .target-table input:focus { border-color: var(--secondary); outline: none; }
    .target-table input:read-only { background: #f3f4f6; color: var(--text-secondary); border-color: transparent; }

    /* 周数据填写 */
    .week-data-section {
      margin-top: 16px;
    }

    .week-data-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .week-data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .week-data-table th {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: var(--text-secondary);
      font-weight: 600;
      padding: 10px 6px;
      text-align: center;
      font-size: 11px;
      border-bottom: 2px solid #dee2e6;
    }

    .week-data-table th:first-child {
      text-align: left;
      padding-left: 12px;
    }

    .week-data-table td {
      padding: 10px 6px;
      text-align: center;
      border-bottom: 1px solid #f1f3f4;
      font-size: 13px;
    }

    .week-data-table td:first-child {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      padding-left: 12px;
      background: #fafbfc;
    }

    .week-data-table tr:last-child td {
      border-bottom: none;
    }

    .week-data-table tr:hover td {
      background: #f8f9fa;
    }

    .week-data-table tr:hover td:first-child {
      background: #f0f4f8;
    }

    .week-data-table input {
      width: 38px;
      padding: 6px 4px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      background: #fff;
      transition: all 0.2s;
    }

    .week-data-table input:hover {
      border-color: #c49660;
    }

    .week-data-table input:focus {
      border-color: var(--secondary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.2);
    }

    /* 隐藏数字输入框的上下箭头 */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }

    .week-data-total {
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-around;
      font-size: 12px;
      border: 1px solid #e9ecef;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .week-data-total .item {
      text-align: center;
      padding: 8px 16px;
      border-radius: 8px;
      background: white;
      min-width: 70px;
    }

    .week-data-total .label {
      color: var(--text-secondary);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .week-data-total .value {
      font-weight: 700;
      color: var(--secondary);
      font-size: 18px;
    }

    .team-summary-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px dashed rgba(212, 165, 116, 0.3);
    }

    /* 累计积分 */
    .total-points-section {
      background: linear-gradient(135deg, rgba(26, 54, 93, 0.1) 0%, rgba(212, 165, 116, 0.1) 100%);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(212, 165, 116, 0.3);
    }

    .total-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .total-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--secondary);
    }

    /* 周积分统计表格 */
    .week-points-section {
      margin-bottom: 16px;
    }

    .week-points-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .week-points-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .week-points-table th {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: var(--text-secondary);
      font-weight: 600;
      padding: 8px 4px;
      text-align: center;
      font-size: 10px;
      border-bottom: 2px solid #dee2e6;
    }

    .week-points-table th:first-child {
      text-align: left;
      padding-left: 8px;
    }

    .week-points-table td {
      padding: 8px 4px;
      text-align: center;
      border-bottom: 1px solid #f1f3f4;
      font-size: 11px;
    }

    .week-points-table td.item-name {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      padding-left: 8px;
      background: #fafbfc;
    }

    .week-points-table td.total {
      font-weight: 700;
      color: var(--secondary);
      background: rgba(212, 165, 116, 0.1);
    }

    .week-points-table tr:last-child td {
      border-bottom: none;
    }

    /* 个人过程数据汇总表格 */
    .personal-summary-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 100%;
    }

    .personal-summary-table {
      border-collapse: collapse;
      font-size: 12px;
      min-width: 900px;
      width: 100%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .personal-summary-table th {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: var(--text-secondary);
      font-weight: 600;
      padding: 8px 4px;
      text-align: center;
      font-size: 11px;
      border: 1px solid #dee2e6;
      white-space: nowrap;
    }

    .personal-summary-table td {
      padding: 8px 4px;
      text-align: center;
      border: 1px solid #e9ecef;
      font-size: 12px;
    }

    .personal-summary-table .col-name-cell {
      min-width: 60px;
      width: 60px;
      text-align: center;
      font-weight: 600;
      color: var(--text);
      padding: 8px 6px;
      background: #fafbfc;
      position: sticky;
      left: 0;
      z-index: 1;
      white-space: nowrap;
      box-shadow: 2px 0 4px rgba(0,0,0,0.08);
    }

    .personal-summary-table thead .col-name-cell {
      background: linear-gradient(135deg, var(--primary) 0%, #2d4a7c 100%);
      color: #fff;
      z-index: 2;
      box-shadow: 2px 0 4px rgba(0,0,0,0.15);
    }

    .personal-summary-table .col-day-group {
      background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
      color: var(--text);
      font-size: 12px;
    }

    .personal-summary-table .col-sub {
      background: #f8f9fa;
      font-size: 10px;
      color: var(--text-secondary);
      width: 40px;
      min-width: 40px;
    }

    .personal-summary-table .col-sub-points {
      background: #fff5e6;
      font-size: 10px;
      color: var(--secondary);
      width: 42px;
      min-width: 42px;
    }

    .personal-summary-table .col-total-group {

  <script>
    // 积分配置
    const ELEMENTS = [
      { type: 'order', name: '订单', unit: '个', rule: '200分/个', pointsPerUnit: 200 },
      { type: 'invite', name: '邀约', unit: '批', rule: '50分/批', pointsPerUnit: 50 },
      { type: 'ticket', name: '门票', unit: '个', rule: '100分/个', pointsPerUnit: 100 },
      { type: 'call', name: '呼出', unit: '个', rule: '1分/个', pointsPerUnit: 1 },
      { type: 'mass', name: '群发', unit: '个', rule: '1分/10个', pointsPerUnit: 0.1, maxPoints: 50 },
      { type: 'test', name: '试驾', unit: '批', rule: '20分/批', pointsPerUnit: 20 },
      { type: 'delivery', name: '交付', unit: '个', rule: '30分/个', pointsPerUnit: 30 }
    ];

    // 目标配置
    const TARGET_TYPES = [
      { type: 'order', name: '订单', targetKey: 'orderTarget', achieveKey: 'orderAchieve' },
      { type: 'invite', name: '邀约', targetKey: 'inviteTarget', achieveKey: 'inviteAchieve' },
      { type: 'ticket', name: '门票', targetKey: 'ticketTarget', achieveKey: 'ticketAchieve' }
    ];

    // GitHub API 配置（用于云端数据共享）
    // Token 通过环境变量或运行时配置获取，避免硬编码在代码中
    const GITHUB_CONFIG = {
      token: '',  // 运行时从 localStorage 或用户输入获取
      owner: 'chengsing867',
      repo: 'point-system',
      path: 'data.json',
      branch: 'main'
    };

    // 初始化 GitHub Token
    function initGitHubToken() {
      // 优先从 localStorage 获取
      const savedToken = safeGetItem('github_token');
      if (savedToken) {
        GITHUB_CONFIG.token = savedToken;
        return true;
      }
      return false;
    }

    // 设置 GitHub Token（管理员首次使用时调用）
    function setGitHubToken(token) {
      GITHUB_CONFIG.token = token;
      safeSetItem('github_token', token);
    }

    // 保存 GitHub Token（从管理界面输入）
    function saveGitHubToken() {
      const token = document.getElementById('githubTokenInput').value.trim();

    // 云端数据加载状态

    // 安全的 localStorage 读取（兼容隐私模式/微信内置浏览器）
    function safeGetItem(key) {
      try { return localStorage.getItem(key); } catch (e) { return null; }
    }
    function safeSetItem(key, value) {
      try { localStorage.setItem(key, value); } catch (e) { console.warn('localStorage 写入失败:', e.message); }
    }
    function safeRemoveItem(key) {
      try { localStorage.removeItem(key); } catch (e) { console.warn('localStorage 删除失败:', e.message); }
    }
    function safeJSONParse(str, fallback) {
      try { return str ? JSON.parse(str) : fallback; } catch (e) { return fallback; }
    }

    // 从本地存储加载数据
    function loadLocalData() {

    // 从 GitHub 云端加载数据（三层回退：jsdelivr CDN → GitHub API → raw）
    function loadCloudData() {
      const loginBtn = document.querySelector('#step1 .btn-primary');
      const setBtnLoading = (loading) => {
        if (!loginBtn) return;
        if (loading) {
          loginBtn.textContent = '正在同步数据...';
          loginBtn.disabled = true;
          loginBtn.style.opacity = '0.6';
        } else {
          loginBtn.textContent = '登 录';
          loginBtn.disabled = false;
          loginBtn.style.opacity = '1';
        }
      };
      setBtnLoading(true);

      // 超时保护：8秒后无论结果都恢复登录按钮（避免弱网卡死）
      let finished = false;
      const timeoutId = setTimeout(() => {
        if (!finished) {
          finished = true;
          console.warn('云端数据加载超时(8s)，使用本地数据');
          cloudDataLoaded = false;
          safeCall(updateCloudStatus);
          setBtnLoading(false);
        }
      }, 8000);

      const owner = GITHUB_CONFIG.owner, repo = GITHUB_CONFIG.repo, path = GITHUB_CONFIG.path, branch = GITHUB_CONFIG.branch;
      const ts = Date.now();

      // 数据源（按优先级）：1.jsdelivr(快/可能有缓存) 2.GitHub API(最新/国内可访问) 3.raw(最新/可能被墙)
      const sources = [
        { name: 'jsdelivr', fetch: () => fetchText(`https://cdn.jsdelivr.net/gh/${owner}/${repo}@${branch}/${path}?t=${ts}`) },
        { name: 'GitHub API', fetch: () => fetchGitHubApi(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}&t=${ts}`) },
        { name: 'raw', fetch: () => fetchText(`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}?t=${ts}`) }
      ];

      let idx = 0;
      function tryNext() {
        if (finished) return;
        if (idx >= sources.length) {
          finished = true;
          clearTimeout(timeoutId);
          console.log('⚠️ 所有云端数据源均失败，使用本地数据');
          cloudDataLoaded = false;
          safeCall(updateCloudStatus);
          setBtnLoading(false);
          return;
        }
        const src = sources[idx++];
        // 每个数据源设置 5 秒超时
        Promise.race([
          src.fetch(),
          new Promise((_, reject) => setTimeout(() => reject(new Error('超时')), 5000))
        ])
          .then(text => {
            if (finished) return;
            finished = true;
            clearTimeout(timeoutId);
            console.log(`✅ [${src.name}] 数据加载成功`);
            applyCloudData(text);
          })
          .catch(err => {
            console.log(`❌ [${src.name}] 加载失败:`, err.message);
            tryNext();
          });
      }
      tryNext();

      function fetchText(url) {
        return fetch(url, { headers: { 'Cache-Control': 'no-cache' } })
          .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.text(); });
      }

      function fetchGitHubApi(url) {
        return fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } })
          .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
          .then(data => decodeURIComponent(escape(atob((data.content || '').replace(/\n/g, '')))));
      }

      function applyCloudData(text) {
        try {
          const cloudData = JSON.parse(text);
          state.users = cloudData.users || state.users;
          state.records = cloudData.records || state.records;
          state.targets = cloudData.targets || state.targets;
          state.shops = cloudData.shops || state.shops;
          if (cloudData.rules) state.rules = cloudData.rules;
          saveLocalData();
          cloudDataLoaded = true;

          console.log('云端数据：门店', state.shops.length, '个，用户', state.users.length, '个');
          state.shops.forEach(shop => {
            console.log(`  门店[${shop.name}] 人员${shop.members ? shop.members.length : 0}人`);
          });
          safeCall(updateCloudStatus);
          setBtnLoading(false);

          // 如果已登录，刷新界面（用 safeCall 避免抛错）
          if (state.currentUser) {
            safeCall(updateUserInfo);
            safeCall(renderTeamSummaryColumn);
            safeCall(updateBanner);
          }
        } catch (e) {
          console.error('解析云端数据失败:', e);
          setBtnLoading(false);
        }
      }
    }

    function loadData() {
      loadLocalData();
    }

    // 保存到本地存储
    function saveLocalData() {
      safeSetItem('point_users', JSON.stringify(state.users));
      safeSetItem('point_records', JSON.stringify(state.records));
      safeSetItem('point_targets', JSON.stringify(state.targets));
      safeSetItem('point_shops', JSON.stringify(state.shops));
      safeSetItem('point_rules', JSON.stringify(state.rules));

    // 保存数据（本地 + 云端）
    function saveData() {
      // 先保存到本地
      saveLocalData();
      
      // 异步保存到 GitHub 云端
      saveCloudData();
    }

    // 保存数据到 GitHub 云端（带自动重试，解决 SHA 冲突）
    let saveLock = false;  // 保存锁，避免并发保存
    let pendingSave = null; // 待执行的保存请求

    function saveCloudData() {
      // 如果没有 Token，无法保存到云端
      if (!GITHUB_CONFIG.token) {
        console.log('未配置 Token，数据仅保存在本地');
        return;
      }

      // 串行化保存：避免并发请求导致 SHA 冲突
      if (saveLock) {
        console.log('⏳ 上一个保存任务进行中，合并到下一个');
        pendingSave = true;
        return;
      }
      saveLock = true;
      
      const data = {
        users: state.users,
        records: state.records,
        targets: state.targets,
        shops: state.shops,
        rules: state.rules,
        updatedAt: new Date().toISOString()
      };

      const jsonStr = JSON.stringify(data);
      const content = btoa(unescape(encodeURIComponent(jsonStr)));
      
      const apiBase = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}`;
      const headers = {
        'Authorization': `token ${GITHUB_CONFIG.token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };

      // 自动重试：遇到 SHA 冲突时重新获取最新 SHA 并重试
      let retryCount = 0;
      const MAX_RETRY = 3;
      
      function attemptSave() {
        // 步骤1: 每次都重新获取最新的 SHA（解决冲突的关键）
        return fetch(`${apiBase}/contents/${GITHUB_CONFIG.path}?ref=${GITHUB_CONFIG.branch}&t=${Date.now()}`, { headers })
        .then(response => {
          if (response.status === 404) {
            return doUpdate(null);
          }
          if (!response.ok) throw new Error('获取文件sha失败: HTTP ' + response.status);
          return response.json().then(fileInfo => {
            const sha = fileInfo.sha;
            console.log(`[尝试${retryCount + 1}] 获取到文件 sha:`, sha);
            return doUpdate(sha);
          });
        })
        .catch(error => handleError(error));
      }

      function doUpdate(sha) {
        const body = {
          message: '更新积分系统数据 ' + new Date().toLocaleString('zh-CN'),
          content: content,
          branch: GITHUB_CONFIG.branch
        };
        if (sha) body.sha = sha;
        
        return fetch(`${apiBase}/contents/${GITHUB_CONFIG.path}`, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify(body)
        })
        .then(response => {
          if (response.ok) {
            return response.json().then(data => {
              console.log('✅ 数据已同步到云端，commit:', data.commit && data.commit.sha);
              showToast('数据已同步到云端', 'success');
              return data;
            });
          }
          return response.json().then(err => {
            throw new Error(err.message || 'HTTP ' + response.status);
          });
        })
        .catch(error => handleError(error));
      }

      function handleError(error) {
        const isSHAConflict = error.message && (error.message.includes('does not match') || error.message.includes('not match') || error.message.includes('SHA'));
        if (isSHAConflict && retryCount < MAX_RETRY) {
          retryCount++;
          console.warn(`[尝试${retryCount}] SHA冲突，1秒后重新获取最新SHA并重试:`, error.message);
          return new Promise(resolve => setTimeout(resolve, 1000)).then(() => attemptSave());
        }
        if (retryCount < MAX_RETRY) {
          retryCount++;
          console.warn(`[尝试${retryCount}] 保存失败，1秒后重试:`, error.message);
          return new Promise(resolve => setTimeout(resolve, 1000)).then(() => attemptSave());
        }
        throw error;
      }

      attemptSave()
        .catch(error => {
          console.error('云端保存失败:', error.message);
          showToast('云端保存失败: ' + error.message, 'error');
        })
        .finally(() => {
          saveLock = false;
          // 如果有挂起的保存请求，执行最新一次
          if (pendingSave) {
            pendingSave = false;
            console.log('🔄 执行挂起的保存请求');
            setTimeout(() => saveCloudData(), 500);
          }
        });
    }

    function saveRules() {
      saveLocalData();
      saveCloudData();
    }

    function isCurrentUserAdmin() {
      return state.currentUser && state.currentUser.isAdmin === true;

    // 清理 state.rules 中的重复项（按 type 去重，保留第一个）
    function deduplicateRules() {
      const seen = new Set();
      state.rules = state.rules.filter(r => {
        if (!r || !r.type) return false;
        if (seen.has(r.type)) return false;
        seen.add(r.type);
        return true;
      });
    }

    // 安全调用函数，避免单个函数抛错导致整个流程中断
    function safeCall(fn) {
      try { if (typeof fn === 'function') fn(); } catch (e) { console.error('safeCall 捕获错误:', e); }

    function loadTitle() {

    // 渲染团队汇总栏（顶部区域）
    // 获取单个成员的周数据
    function getMemberWeekData(userId) {
      const now = new Date();
      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      const orderWeek = [0, 0, 0, 0, 0, 0, 0];
      const inviteWeek = [0, 0, 0, 0, 0, 0, 0];
      const ticketWeek = [0, 0, 0, 0, 0, 0, 0];

      // 从 state.records 读取数据（与个人过程数据汇总一致）
      const userRecords = state.records.filter(r => r.userId === userId);

      ['order', 'invite', 'ticket'].forEach(type => {
        for (let i = 0; i < 7; i++) {
          const day = new Date(monday);
          day.setDate(monday.getDate() + i);
          const dayStr = day.toDateString();
          const dayValue = userRecords
            .filter(r => r.elementType === type && new Date(r.date).toDateString() === dayStr)
            .reduce((sum, r) => sum + r.value, 0);
          if (type === 'order') orderWeek[i] = dayValue;
          else if (type === 'invite') inviteWeek[i] = dayValue;
          else if (type === 'ticket') ticketWeek[i] = dayValue;
        }
      });

      return { orderWeek, inviteWeek, ticketWeek };
    }

    // 渲染团队汇总横幅表格
    function renderTeamSummaryColumn() {
      const container = document.getElementById('teamSummaryColumn');
      if (!state.currentUser) {
        container.innerHTML = '<div class="empty-state"><p>请先登录</p></div>';
        return;
      }

      const members = getCurrentShopMembers();
      if (members.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>暂无参与人员</p></div>';
        return;
      }

      const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

      const membersData = members.map(user => {
        const targets = getUserTargets(user.id);
        const weekData = getMemberWeekData(user.id);
        return {
          name: user.name,
          orderTarget: targets.orderTarget || 0,
          inviteTarget: targets.inviteTarget || 0,
          ticketTarget: targets.ticketTarget || 0,
          orderAchieve: targets.orderAchieve || 0,
          inviteAchieve: targets.inviteAchieve || 0,
          ticketAchieve: targets.ticketAchieve || 0,
          orderWeek: weekData.orderWeek,
          inviteWeek: weekData.inviteWeek,
          ticketWeek: weekData.ticketWeek
        };
      });

      const totals = {
        orderTarget: 0, inviteTarget: 0, ticketTarget: 0,
        orderAchieve: 0, inviteAchieve: 0, ticketAchieve: 0,
        orderWeek: [0,0,0,0,0,0,0],
        inviteWeek: [0,0,0,0,0,0,0],
        ticketWeek: [0,0,0,0,0,0,0]
      };
      membersData.forEach(m => {
        totals.orderTarget += m.orderTarget;
        totals.inviteTarget += m.inviteTarget;
        totals.ticketTarget += m.ticketTarget;
        totals.orderAchieve += m.orderAchieve;
        totals.inviteAchieve += m.inviteAchieve;
        totals.ticketAchieve += m.ticketAchieve;
        for (let i = 0; i < 7; i++) {
          totals.orderWeek[i] += m.orderWeek[i];
          totals.inviteWeek[i] += m.inviteWeek[i];
          totals.ticketWeek[i] += m.ticketWeek[i];
        }
      });

      function getAchievementRate(target, achieve) {
        if (!target) return '-';
        return Math.round((achieve / target) * 100) + '%';
      }
      function getRateClass(target, achieve) {
        if (!target) return '';
        const rate = achieve / target;
        if (rate >= 1) return 'high';
        if (rate >= 0.5) return 'mid';
        return 'low';
      }

      let html = `
        <div class="team-banner-wrapper">
          <div class="team-banner-scroll">
            <table class="team-banner-table">
              <thead>
                <tr>
                  <th rowspan="2" class="col-name">人员</th>
                  <th rowspan="2" class="target-col">订单<br>目标</th>
                  <th rowspan="2" class="target-col">邀约<br>目标</th>
                  <th rowspan="2" class="target-col">门票<br>目标</th>
                  <th rowspan="2" class="achieve-col">订单<br>达成</th>
                  <th rowspan="2" class="achieve-col">邀约<br>达成</th>
                  <th rowspan="2" class="achieve-col">门票<br>达成</th>
                  <th rowspan="2" class="grand-total-col">总计</th>
                  <th rowspan="2" class="rate">达成率</th>
      `;

      weekDays.forEach(day => {
        html += `<th colspan="3" class="day-group">${day}</th>`;
      });

      html += `
                </tr>
                <tr>
      `;

      for (let i = 0; i < 7; i++) {
        html += `<th class="sub-col">订单</th><th class="sub-col">邀约</th><th class="sub-col">门票</th>`;
      }

      html += `
                </tr>
              </thead>
              <tbody>
      `;

      // 每个成员一行
      membersData.forEach(m => {
        const totalOrder = m.orderWeek.reduce((a,b) => a+b, 0);
        const totalInvite = m.inviteWeek.reduce((a,b) => a+b, 0);
        const totalTicket = m.ticketWeek.reduce((a,b) => a+b, 0);
        // 总计 = 订单达成 + 邀约达成 + 门票达成
        const grandTotal = m.orderAchieve + m.inviteAchieve + m.ticketAchieve;
        const rate = getAchievementRate(m.orderTarget, m.orderAchieve);
        const rateClass = getRateClass(m.orderTarget, m.orderAchieve);

        html += `<tr><td class="col-name">${m.name}</td>`;
        html += `<td class="target-cell">${m.orderTarget}</td><td class="target-cell">${m.inviteTarget}</td><td class="target-cell">${m.ticketTarget}</td>`;
        html += `<td class="achieve-cell">${m.orderAchieve}</td><td class="achieve-cell">${m.inviteAchieve}</td><td class="achieve-cell">${m.ticketAchieve}</td>`;
        html += `<td class="grand-total-cell">${grandTotal}</td>`;
        html += `<td class="rate ${rateClass}">${rate}</td>`;

        // 每天数据
        for (let i = 0; i < 7; i++) {
          html += `<td>${m.orderWeek[i] || '-'}</td><td>${m.inviteWeek[i] || '-'}</td><td>${m.ticketWeek[i] || '-'}</td>`;
        }
        html += `</tr>`;
      });

      html += `</tbody></table></div></div>`;

      container.innerHTML = html;
    }

    function editTitle() {
      if (!state.currentUser || !state.currentUser.isAdmin) return;
      const title = document.getElementById('mainTitle');
      const input = document.getElementById('titleInput');

    // 获取用户目标数据
    function getUserTargets(userId) {
      // 从 state.shops 中查找当前门店的最新数据
      let currentShop = state.currentShop;
      if (state.currentShop) {
        // 优先从 state.shops 中获取最新引用
        const latestShop = state.shops.find(s => s.id === state.currentShop.id);
        if (latestShop) currentShop = latestShop;
      }
      
      if (currentShop && currentShop.members) {
        const member = currentShop.members.find(m => m.id === userId);
        if (member) {
          // 计算本周达成数
          const now = new Date();
          const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
          const monday = new Date(now);
          monday.setDate(now.getDate() - (dayOfWeek - 1));
          monday.setHours(0, 0, 0, 0);

          const userRecords = state.records.filter(r => r.userId === userId);
          let orderAchieve = 0, inviteAchieve = 0, ticketAchieve = 0;
          for (let i = 0; i < 7; i++) {
            const day = new Date(monday);
            day.setDate(monday.getDate() + i);
            const dayStr = day.toDateString();
            orderAchieve += userRecords.filter(r => r.elementType === 'order' && new Date(r.date).toDateString() === dayStr).reduce((sum, r) => sum + r.value, 0);
            inviteAchieve += userRecords.filter(r => r.elementType === 'invite' && new Date(r.date).toDateString() === dayStr).reduce((sum, r) => sum + r.value, 0);
            ticketAchieve += userRecords.filter(r => r.elementType === 'ticket' && new Date(r.date).toDateString() === dayStr).reduce((sum, r) => sum + r.value, 0);
          }
          
          return {
            orderTarget: member.orderTarget || 0,
            inviteTarget: member.inviteTarget || 0,
            ticketTarget: member.ticketTarget || 0,
            orderAchieve: orderAchieve,
            inviteAchieve: inviteAchieve,
            ticketAchieve: ticketAchieve
          };
        }
      }
      
      // 兼容旧数据
      if (!state.targets[userId]) {
        state.targets[userId] = {
          orderTarget: 0,
          inviteTarget: 0,
          ticketTarget: 0,
          orderAchieve: 0,
          inviteAchieve: 0,
          ticketAchieve: 0
        };
      }

      const now = new Date();
      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      const userRecords = state.records.filter(r => r.userId === userId);
      ['order', 'invite', 'ticket'].forEach(type => {
        let total = 0;
        for (let i = 0; i < 7; i++) {
          const day = new Date(monday);
          day.setDate(monday.getDate() + i);
          const dayStr = day.toDateString();
          const dayValue = userRecords
            .filter(r => r.elementType === type && new Date(r.date).toDateString() === dayStr)
            .reduce((sum, r) => sum + r.value, 0);
          total += dayValue;
        }
        const achieveKey = type + 'Achieve';
        state.targets[userId][achieveKey] = total;
      });

      return state.targets[userId];
    }

    // 获取当前门店的成员列表
    function getCurrentShopMembers() {
      if (state.currentShop) {
        // 优先从 state.shops 中获取最新引用
        const latestShop = state.shops.find(s => s.id === state.currentShop.id);
        if (latestShop && latestShop.members) {
          return latestShop.members;
        }
      }
      if (state.currentShop && state.currentShop.members) {
        return state.currentShop.members;
      }
      return [];
    }

    // 获取团队汇总数据
    function getTeamSummary() {
      const now = new Date();
      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      const teamOrderWeek = [0, 0, 0, 0, 0, 0, 0];
      const teamInviteWeek = [0, 0, 0, 0, 0, 0, 0];
      const teamTicketWeek = [0, 0, 0, 0, 0, 0, 0];

      let totalOrderTarget = 0;
      let totalInviteTarget = 0;
      let totalTicketTarget = 0;
      let totalOrderAchieve = 0;
      let totalInviteAchieve = 0;
      let totalTicketAchieve = 0;

      const members = getCurrentShopMembers();
      members.forEach(member => {
        const targets = getUserTargets(member.id);
        totalOrderTarget += targets.orderTarget || 0;
        totalInviteTarget += targets.inviteTarget || 0;
        totalTicketTarget += targets.ticketTarget || 0;
        totalOrderAchieve += targets.orderAchieve || 0;
        totalInviteAchieve += targets.inviteAchieve || 0;
        totalTicketAchieve += targets.ticketAchieve || 0;

        const userRecords = state.records.filter(r => r.userId === member.id);
        ['order', 'invite', 'ticket'].forEach(type => {
          for (let i = 0; i < 7; i++) {
            const day = new Date(monday);
            day.setDate(monday.getDate() + i);
            const dayStr = day.toDateString();
            const dayValue = userRecords
              .filter(r => r.elementType === type && new Date(r.date).toDateString() === dayStr)
              .reduce((sum, r) => sum + r.value, 0);
            if (type === 'order') teamOrderWeek[i] += dayValue;
            else if (type === 'invite') teamInviteWeek[i] += dayValue;
            else if (type === 'ticket') teamTicketWeek[i] += dayValue;
          }
        });
      });

      return {
        totalOrderTarget,
        totalInviteTarget,
        totalTicketTarget,
        totalOrderAchieve,
        totalInviteAchieve,
        totalTicketAchieve,
        teamOrderWeek,
        teamInviteWeek,
        teamTicketWeek
      };
    }

    // 生成周数据输入框
    function generateWeekInputs(type, isAdmin) {
      const now = new Date();
      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let html = '';
      for (let i = 0; i < 7; i++) {
        const day = new Date(monday);
        day.setDate(monday.getDate() + i);

        const isPast = day < today;
        const isToday = day.getTime() === today.getTime();
        const isFuture = day > today;

        let disabled = '';
        if (isFuture) {
          disabled = 'disabled';
        } else if (isPast && !isAdmin) {
          disabled = 'disabled';
        }

        const inputId = `week${type.charAt(0).toUpperCase() + type.slice(1)}${i + 1}`;
        html += `<td><input type="number" id="${inputId}" min="0" ${disabled} onchange="updateWeekData('${type}', ${i}, this.value)"></td>`;
      }
      return html;
    }

      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      ['ticket', 'order', 'invite'].forEach(type => {
        for (let i = 0; i < 7; i++) {
          const day = new Date(monday);
          day.setDate(monday.getDate() + i);
          const dateStr = day.toISOString().split('T')[0];

      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);

    function renderPointsColumn() {
      const container = document.getElementById('pointsColumn');
      if (!state.currentUser) {
        container.innerHTML = '<div class="empty-state"><p>请先登录</p></div>';
        return;
      }

      // 上报对象：管理员可代填任意成员，普通用户为自己
      const targetId = getSubmitTargetId();
      const targetUser = getSubmitTargetUser();

      const today = new Date();
      const todayStr = today.toDateString();
      const dayOfWeek = today.getDay() === 0 ? 7 : today.getDay();
      const weekDayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
      const currentDayName = weekDayNames[dayOfWeek - 1];

      // 计算本周一的日期
      const monday = new Date(today);
      monday.setDate(today.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      // 始终按照 ELEMENTS 的顺序，但使用 state.rules 中的配置（如果有）
      const rules = ELEMENTS.map(defaultEl => {
        const custom = state.rules ? state.rules.find(r => r.type === defaultEl.type) : null;
        return custom || defaultEl;
      });

      // 计算每个项目在周一~周日每天的数值和积分（基于上报对象）
      // weekData[type][dayIndex] = { value: 数字, points: 数字 }
      const weekData = {};
      rules.forEach(el => {
        weekData[el.type] = [];
        for (let i = 0; i < 7; i++) {
          const day = new Date(monday);
          day.setDate(monday.getDate() + i);
          const dayStr = day.toDateString();
          const dayRecords = state.records.filter(r =>
            r.userId === targetId &&
            new Date(r.date).toDateString() === dayStr &&
            r.elementType === el.type
          );
          const dayValue = dayRecords.reduce((sum, r) => sum + r.value, 0);
          const dayPoints = dayRecords.reduce((sum, r) => sum + r.points, 0);
          weekData[el.type].push({ value: dayValue, points: dayPoints });
        }
      });

      // 计算每个项目的周合计
      const weekTotals = {};
      rules.forEach(el => {
        weekTotals[el.type] = weekData[el.type].reduce(
          (acc, d) => ({ value: acc.value + d.value, points: acc.points + d.points }),
          { value: 0, points: 0 }
        );
      });

      // 计算每日小计（所有项目在当日的数值与积分之和）
      const dailySubtotals = [];
      for (let i = 0; i < 7; i++) {
        let dayValue = 0;
        let dayPoints = 0;
        rules.forEach(el => {
          dayValue += weekData[el.type][i].value;
          dayPoints += weekData[el.type][i].points;
        });
        dailySubtotals.push({ value: dayValue, points: dayPoints });
      }
      // 总计（所有项目、所有天数的总和）
      const grandTotal = rules.reduce(
        (acc, el) => ({
          value: acc.value + weekTotals[el.type].value,
          points: acc.points + weekTotals[el.type].points
        }),
        { value: 0, points: 0 }
      );

      // 计算今日已提交积分（基于上报对象）
      const todayRecords = state.records.filter(r =>
        r.userId === targetId && new Date(r.date).toDateString() === todayStr
      );
      const submittedTodayPoints = todayRecords.reduce((sum, r) => sum + r.points, 0);

      // 加上当前正在输入但尚未提交的积分，实现实时同步
      let pendingTodayPoints = 0;
      rules.forEach(el => {
        const val = state.values[el.type] || '';
        const value = parseInt(val) || 0;
        if (value <= 0) return;
        let p = Math.round(value * el.pointsPerUnit);
        if (el.maxPoints && el.maxPoints > 0) {
          p = Math.min(p, el.maxPoints);
        }
        pendingTodayPoints += p;
      });
      const totalTodayPoints = submittedTodayPoints + pendingTodayPoints;

      // ========== 个人过程数据汇总表格 HTML ==========
      let html = `
        <div class="week-points-section">
          <div class="week-points-title">📊 本周数据汇总（周一~周日）</div>

            <table class="personal-summary-table">
              <thead>
                <tr>
                  <th rowspan="2" class="col-name-cell">项目</th>
                  <th colspan="2" class="col-total-group">合计</th>
      `;

      // 周一~周日 列头
      for (let i = 0; i < 7; i++) {
        html += `<th colspan="2" class="col-day-group">${weekDayNames[i]}</th>`;
      }

      html += `
                </tr>
                <tr>
                  <th class="col-sub">数值</th><th class="col-sub-points">积分</th>
      `;

      // 第二行：每天的 数值 / 积分
      for (let i = 0; i < 7; i++) {
        html += `<th class="col-sub">数值</th><th class="col-sub-points">积分</th>`;
      }

      html += `
                </tr>
              </thead>
              <tbody>
      `;

      // 每个项目一行
      const isAdmin = state.currentUser && state.currentUser.isAdmin;
      // 计算本周一到周日的日期字符串，用于管理员编辑时保存记录
      const weekDates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        weekDates.push(d);

      rules.forEach(el => {

        html += `<td class="col-total-points" id="week-total-points-${el.type}">${total.points > 0 ? '+' + total.points : '-'}</td>`;

          html += `<td class="col-points" id="week-points-${el.type}-${i}">${d.points > 0 ? '+' + d.points : '-'}</td>`;
        }
        html += `</tr>`;
      });

      html += `<tr class="subtotal-row"><td class="col-name-cell">小计</td>`;
      // 合计列位置：显示总计积分
      html += `<td class="col-subtotal-value grand" id="grand-total-value" style="visibility:hidden">-</td>`;
      html += `<td class="col-subtotal-points grand" id="grand-total-points">${grandTotal.points > 0 ? '+' + grandTotal.points : '-'}</td>`;
      for (let i = 0; i < 7; i++) {
        const d = dailySubtotals[i];
        // 数值小计单元格留空（不统计）
        html += `<td class="col-subtotal-value" style="visibility:hidden">-</td>`;
        html += `<td class="col-subtotal-points" id="subtotal-points-${i}">${d.points > 0 ? '+' + d.points : '-'}</td>`;
      }
      html += `</tr>`;

      html += `
              </tbody>
            </table>
          </div>
        </div>

        <!-- 今日上报 -->
        <div class="day-form">
          <div class="day-form-title">✏️ 今日上报（${currentDayName}）</div>
      `;

      // 管理员可切换上报对象（代填数据）
      if (state.currentUser && state.currentUser.isAdmin) {
        const members = getCurrentShopMembers();
        if (members.length > 0) {
          if (!state.submitTargetId || !members.find(m => m.id === state.submitTargetId)) {
            state.submitTargetId = members[0].id;
          }
          html += `
            <div class="submit-target-bar">
              <label class="submit-target-label">上报对象：</label>
              <select class="submit-target-select" onchange="switchSubmitTarget(this.value)">
                ${members.map(m => `<option value="${m.id}" ${m.id === state.submitTargetId ? 'selected' : ''}>${m.name}（${m.phone}）</option>`).join('')}
              </select>
            </div>
          `;
        }
      } else {
        // 普通用户：显示自己的名字
        html += `
          <div class="submit-target-bar">
            <span class="submit-target-label">上报人：<strong>${state.currentUser.name}</strong></span>
          </div>
        `;
      }

      html += `
          <table class="mini-points-table">
            <thead>
              <tr>
                <th>项目</th>
                <th>规则</th>
                <th>数量</th>
                <th>积分</th>
              </tr>
            </thead>
            <tbody>
      `;

      rules.forEach(el => {
        const val = state.values[el.type] || '';
        const value = parseInt(val) || 0;

        // 计算积分：pointsPerUnit 表示每单位得多少分，统一用乘法
        let points = Math.round(value * el.pointsPerUnit);
        if (el.maxPoints && el.maxPoints > 0) {
          points = Math.min(points, el.maxPoints);
        }

        // 规则显示文本
        let ruleText = '';
        if (el.pointsPerUnit <= 0) {
          ruleText = `0分/${el.unit}`;
        } else if (el.pointsPerUnit >= 1) {
          ruleText = `${el.pointsPerUnit}分/${el.unit}`;
        } else {
          const dp = Math.round(1 / el.pointsPerUnit);
          ruleText = `1分/${dp}${el.unit}`;
        }
        if (el.maxPoints && el.maxPoints > 0) {
          ruleText += ` (上限${el.maxPoints}分)`;
        }

        html += `
          <tr>
            <td>${el.name}</td>
            <td class="rule">${ruleText}</td>
            <td><input type="number" data-type="${el.type}" placeholder="0" min="0" value="${val}" oninput="onPointsChange('${el.type}', this.value)"></td>
            <td class="points-cell" id="points-cell-${el.type}">+${points}</td>
          </tr>
        `;
      });

      html += `
            </tbody>
          </table>
          <div class="target-summary">
            <div class="label">今日已得积分</div>
            <div class="value achieved" id="totalTodayPoints">${totalTodayPoints > 0 ? '+' + totalTodayPoints : '0'}</div>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function onPointsChange(type, value) {
      state.values[type] = value;
      // 不重新渲染整个表格（会导致输入框失焦），仅更新对应积分单元格和今日已得积分
      const rules = ELEMENTS.map(defaultEl => {
        const custom = state.rules ? state.rules.find(r => r.type === defaultEl.type) : null;
        return custom || defaultEl;
      });

      // 更新当前项目的积分单元格
      const el = rules.find(r => r.type === type);
      if (el) {
        const v = parseInt(value) || 0;
        let p = Math.round(v * el.pointsPerUnit);
        if (el.maxPoints && el.maxPoints > 0) {
          p = Math.min(p, el.maxPoints);
        }
        const cell = document.getElementById('points-cell-' + type);
        if (cell) cell.textContent = '+' + p;
      }

      // 更新今日已得积分（已提交 + 当前输入中）
      const targetId = getSubmitTargetId();
      const todayStr = new Date().toDateString();
      const todayRecords = state.records.filter(r =>
        r.userId === targetId && new Date(r.date).toDateString() === todayStr
      );
      const submittedPoints = todayRecords.reduce((sum, r) => sum + r.points, 0);
      let pendingPoints = 0;
      rules.forEach(r => {
        const v = parseInt(state.values[r.type]) || 0;
        if (v <= 0) return;
        let p = Math.round(v * r.pointsPerUnit);
        if (r.maxPoints && r.maxPoints > 0) {
          p = Math.min(p, r.maxPoints);
        }
        pendingPoints += p;
      });
      const totalEl = document.getElementById('totalTodayPoints');
      if (totalEl) {
        const total = submittedPoints + pendingPoints;
        totalEl.textContent = total > 0 ? '+' + total : '0';
      }

      updateSubmitBtn();
    }

    // 管理员修改本周某天某项目的数值（自动生成积分并保存）
    function onWeekDataChange(type, dayStr, value) {
      if (!state.currentUser || !state.currentUser.isAdmin) return;

      const targetId = getSubmitTargetId();
      const v = parseInt(value) || 0;
      const rules = ELEMENTS.map(defaultEl => {
        const custom = state.rules ? state.rules.find(r => r.type === defaultEl.type) : null;
        return custom || defaultEl;
      });
      const el = rules.find(r => r.type === type);
      if (!el) return;

      // 计算积分
      let points = Math.round(v * el.pointsPerUnit);
      if (el.maxPoints && el.maxPoints > 0) {
        points = Math.min(points, el.maxPoints);
      }

      // 删除当天同用户同类型的旧记录
      state.records = state.records.filter(r =>
        !(r.userId === targetId &&
          new Date(r.date).toDateString() === dayStr &&
          r.elementType === type)
      );

      // 如果数值大于0，保存新记录
      if (v > 0) {
        // 用当天日期的中午时间保存，避免时区问题
        const dayDate = new Date(dayStr);
        dayDate.setHours(12, 0, 0, 0);
        const record = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
          userId: targetId,
          elementType: type,
          value: v,
          points: points,
          date: dayDate.toISOString()
        };
        state.records.push(record);
      }

      saveData();

      // 实时更新表格中的积分、合计、小计（不重新渲染整个表格，避免输入框失焦）
      updateWeekTableDisplay(rules, el, type, dayStr, points, v);
    }

    // 更新本周数据汇总表格的显示（积分单元格、合计、小计）
    function updateWeekTableDisplay(rules, currentEl, currentType, dayStr, newPoints, newValue) {
      // 找到当天是本周第几天
      const today = new Date();
      const dayOfWeek = today.getDay() === 0 ? 7 : today.getDay();
      const monday = new Date(today);
      monday.setDate(today.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);
      const targetDate = new Date(dayStr);
      const dayIndex = Math.round((targetDate - monday) / (24 * 60 * 60 * 1000));

      if (dayIndex < 0 || dayIndex > 6) return;

      // 更新当前项目当天的积分单元格
      const pointsCell = document.getElementById(`week-points-${currentType}-${dayIndex}`);
      if (pointsCell) pointsCell.textContent = newPoints > 0 ? '+' + newPoints : '-';

      // 重新计算当前项目的周合计
      let totalValue = 0;
      let totalPoints = 0;
      // 从输入框读取所有天的数值
      const inputs = document.querySelectorAll(`.week-edit-input[data-type="${currentType}"]`);
      inputs.forEach((input, idx) => {
        const val = parseInt(input.value) || 0;
        totalValue += val;
        let p = Math.round(val * currentEl.pointsPerUnit);
        if (currentEl.maxPoints && currentEl.maxPoints > 0) {
          p = Math.min(p, currentEl.maxPoints);
        }
        totalPoints += p;
      });
      const totalValueCell = document.getElementById(`week-total-value-${currentType}`);
      if (totalValueCell) totalValueCell.textContent = totalValue || '-';
      const totalPointsCell = document.getElementById(`week-total-points-${currentType}`);
      if (totalPointsCell) totalPointsCell.textContent = totalPoints > 0 ? '+' + totalPoints : '-';

      // 重新计算当天的小计（仅积分，不显示数值小计）
      let daySubtotalPoints = 0;
      rules.forEach(r => {
        const input = document.querySelector(`.week-edit-input[data-type="${r.type}"][data-date="${dayStr}"]`);
        const val = input ? (parseInt(input.value) || 0) : 0;
        let p = Math.round(val * r.pointsPerUnit);
        if (r.maxPoints && r.maxPoints > 0) {
          p = Math.min(p, r.maxPoints);
        }
        daySubtotalPoints += p;
      });
      const subtotalPointsCell = document.getElementById(`subtotal-points-${dayIndex}`);
      if (subtotalPointsCell) subtotalPointsCell.textContent = daySubtotalPoints > 0 ? '+' + daySubtotalPoints : '-';

      // 重新计算总计（仅积分）
      let grandPoints = 0;
      rules.forEach(r => {
        const allInputs = document.querySelectorAll(`.week-edit-input[data-type="${r.type}"]`);
        allInputs.forEach(input => {
          const val = parseInt(input.value) || 0;
          let p = Math.round(val * r.pointsPerUnit);
          if (r.maxPoints && r.maxPoints > 0) {
            p = Math.min(p, r.maxPoints);
          }
          grandPoints += p;
        });
      });
      const grandPointsCell = document.getElementById('grand-total-points');
      if (grandPointsCell) grandPointsCell.textContent = grandPoints > 0 ? '+' + grandPoints : '-';

      // 同步更新团队汇总和排行榜
      renderTeamSummaryColumn();
      updateBanner();
    }

    // 管理员切换上报对象
    function switchSubmitTarget(userId) {
      state.submitTargetId = userId;
      state.values = {};  // 清空已填写的数值，避免误填到其他成员
      renderPointsColumn();
      updateSubmitBtn();
    }

    function updateSubmitBtn() {
      // 仅判断是否有输入值，控制按钮启用/禁用
      // 积分显示统一由"今日已得积分"呈现，避免两处计算不一致
      const rules = ELEMENTS.map(defaultEl => {
        const custom = state.rules ? state.rules.find(r => r.type === defaultEl.type) : null;
        return custom || defaultEl;
      });
      let hasInput = false;
      rules.forEach(el => {
        const value = parseInt(state.values[el.type]) || 0;
        if (value > 0) hasInput = true;
      });

      const btn = document.getElementById('submitBtn');
      btn.disabled = !hasInput;
    }

    function isUserExpired(user) {
      if (!user || user.isAdmin) return false;
      const now = new Date();
      if (user.startDate && now < new Date(user.startDate)) return true;
      if (user.endDate && now > new Date(user.endDate)) return true;
      return false;
    }
    
    function submitAll() {
      const today = new Date().toDateString();
      const targetId = getSubmitTargetId();
      const targetUser = getSubmitTargetUser();
      
      if (isUserExpired(targetUser)) {
        showToast('账号已过期，请联系管理员重新激活', 'error');
        return;
      }

      let totalPoints = 0;
      const rules = ELEMENTS.map(defaultEl => {
        const custom = state.rules ? state.rules.find(r => r.type === defaultEl.type) : null;
        return custom || defaultEl;
      });

      // 收集本次提交的类型，用于覆盖当天同类型的旧记录
      const submittedTypes = [];
      rules.forEach(el => {
        const value = parseInt(state.values[el.type]) || 0;
        if (value <= 0) return;

        submittedTypes.push(el.type);

        // 根据配置计算积分：pointsPerUnit 表示每单位得多少分，统一用乘法
        let points = Math.round(value * el.pointsPerUnit);
        // 如果有上限
        if (el.maxPoints && el.maxPoints > 0) {
          points = Math.min(points, el.maxPoints);
        }

        // 只要填写了数值就保存记录（即使积分为0，数值仍需统计）
        const record = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
          userId: targetId,
          elementType: el.type,
          value: value,
          points: points,
          date: new Date().toISOString()
        };
        state.records.push(record);
        totalPoints += points;
      });

      // 覆盖逻辑：当天同用户同类型只保留最新一条记录（以最后一次提交为准）
      const latestIdMap = {};
      submittedTypes.forEach(type => {
        const typeRecords = state.records.filter(r =>
          r.userId === targetId &&
          new Date(r.date).toDateString() === today &&
          r.elementType === type
        );
        if (typeRecords.length > 0) {
          latestIdMap[type] = typeRecords[typeRecords.length - 1].id;
        }
      });
      // 删除当天同用户同类型的所有旧记录（保留最新一条）
      state.records = state.records.filter(r => {
        if (r.userId === targetId &&
            new Date(r.date).toDateString() === today &&
            submittedTypes.includes(r.elementType)) {
          return r.id === latestIdMap[r.elementType];
        }
        return true;
      });

      // 只要有数值提交就保存（即使总积分为0）
      saveData();
      const targetName = targetUser ? targetUser.name : '';
      if (totalPoints > 0) {
        showToast(`已为 ${targetName} 提交 +${totalPoints} 积分`, 'success');
      } else {
        showToast(`已保存 ${targetName} 的数据`, 'success');
      }
      state.values = {};
      renderTeamSummaryColumn();
      renderPointsColumn();
      updateBanner();
    }

    // 更新顶部 banner
    function updateBanner() {
      if (!state.currentUser) return;

      const members = getCurrentShopMembers();

      const userPoints = {};
      members.forEach(u => {
        userPoints[u.id] = state.records
          .filter(r => r.userId === u.id)
          .reduce((sum, r) => sum + r.points, 0);
      });

      const sorted = [...members]
        .map(u => ({ ...u, points: userPoints[u.id] || 0 }))
        .sort((a, b) => b.points - a.points);

      const rankingList = document.getElementById('rankingList');
      if (rankingList) {
        if (sorted.length === 0) {
          rankingList.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无参与人员</div>';
          return;
        }
        
        rankingList.classList.remove('few-items', 'grid-items');
        rankingList.classList.add('grid-items');

        let html = '';
        sorted.forEach((user, idx) => {
          const rank = idx + 1;
          const isCurrent = user.id === state.currentUser.id;
          let rankClass = 'rank-block';
          if (rank === 1) rankClass += ' rank-1';
          else if (rank === 2) rankClass += ' rank-2';
          else if (rank === 3) rankClass += ' rank-3';
          else rankClass += ' rank-other';
          const itemClass = isCurrent ? 'ranking-item current' : 'ranking-item';
          html += `
            <div class="${itemClass}">
              <span class="${rankClass}">${rank}</span>
              <span class="name">${user.name}</span>
              <span class="points">${user.points}</span>
            </div>
          `;
        });
        rankingList.innerHTML = html;
      }
    }

    function verifyLogin() {
      try {
        const phone = document.getElementById('phone').value.trim();
        const name = document.getElementById('realName').value.trim();
        const password = document.getElementById('password').value;
        const ADMIN_PHONE = '13829218486';

        if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
          showToast('请输入正确的11位手机号', 'error');
          return;
        }

        if (!name) {
          showToast('请输入姓名', 'error');
          return;
        }

        if (!password) {
          showToast('请输入密码', 'error');
          return;
        }

        if (password !== '123456') {
          showToast('密码错误', 'error');
          return;
        }

        if (phone === ADMIN_PHONE) {
          let admin = state.users.find(u => u.phone === ADMIN_PHONE);
          if (!admin) {
            admin = {
              id: 'admin',
              phone: ADMIN_PHONE,
              name: '成林涛',
              isAdmin: true,
              createdAt: new Date().toISOString()
            };
            state.users.push(admin);
            saveData();
          }
          admin.isAdmin = true;
          admin.name = '成林涛';
          state.currentUser = admin;
          // 管理员默认进入第一个有效门店（按有效期筛选）
          const now = new Date();
          const validShop = state.shops.find(shop => {
            if (shop.startDate && now < new Date(shop.startDate)) return false;
            if (shop.endDate && now > new Date(shop.endDate)) return false;
            return true;
          }) || state.shops[0] || null;
          state.currentShop = validShop;
          state.adminShopId = validShop ? validShop.id : null;
          state.submitTargetId = null;
          safeSetItem('point_current_user', JSON.stringify(admin));
          safeSetItem('point_current_shop', JSON.stringify(state.currentShop));
          saveData();
          showToast('管理员登录成功', 'success');
          showApp();
          return;
        }

        // 普通用户：遍历所有门店查找手机号+姓名匹配的人员
        const matchedShops = [];
        (state.shops || []).forEach(shop => {
          const members = shop.members || [];
          const member = members.find(m => m.phone === phone && m.name === name);
          if (member) {
            matchedShops.push({ shop, member });
          }
        });

        if (matchedShops.length === 0) {
          showToast('系统中无此人员信息，请联系管理员', 'error');
          return;
        }

        // 优先匹配有效期内的门店
        const now = new Date();
        const inPeriod = matchedShops.filter(({ shop }) => {
          if (shop.startDate && now < new Date(shop.startDate)) return false;
          if (shop.endDate && now > new Date(shop.endDate)) return false;
          return true;
        });

        let chosen = null;
        if (inPeriod.length > 0) {
          // 取有效期内积分最低的门店（让新门店优先）
          inPeriod.sort((a, b) => {
            const aPoints = (state.records || []).filter(r => r.userId === a.member.id).reduce((s, r) => s + r.points, 0);
            const bPoints = (state.records || []).filter(r => r.userId === b.member.id).reduce((s, r) => s + r.points, 0);
            return aPoints - bPoints;
          });
          chosen = inPeriod[0];
        } else {
          // 全部超期则拒绝登录
          showToast('所在门店活动已结束，无法登录', 'error');
          return;
        }

        const shop = chosen.shop;
        const member = chosen.member;

        state.currentUser = member;
        state.currentShop = shop;
        state.submitTargetId = null;
        safeSetItem('point_current_user', JSON.stringify(member));
        safeSetItem('point_current_shop', JSON.stringify(shop));
        showToast('登录成功', 'success');
        showApp();
      } catch (e) {
        console.error('verifyLogin 失败:', e);
        showToast('登录异常，请重试: ' + e.message, 'error');
      }
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

      resetShopForm();
      renderShopList();
      renderRulesSettings();

      const nextWeek = new Date();
      nextWeek.setDate(nextWeek.getDate() + 7);
      const nextWeekStr = nextWeek.toISOString().split('T')[0];

      document.getElementById('memberConfirmBar').style.display = 'none';

        }
      }

    function renderShopList() {
      const list = document.getElementById('shopList');
      if (state.shops.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#999;padding:10px;font-size:13px;">暂无门店</div>';
        document.getElementById('shopMemberSection').style.display = 'none';
        document.getElementById('noShopMessage').style.display = 'block';
        return;
      }
      
      const now = new Date();
      list.innerHTML = state.shops.map(shop => {
        let statusClass = 'color:var(--success);';
        let statusText = '有效';
        if (shop.startDate && now < new Date(shop.startDate)) {
          statusText = '未开始';
          statusClass = 'color:#f59e0b;';
        } else if (shop.endDate && now > new Date(shop.endDate)) {
          statusText = '已结束';
          statusClass = 'color:var(--error);';
        }
        const isSelected = state.adminShopId === shop.id;
        const startDisplay = shop.startDate ? shop.startDate.replace(/-/g, '/') : '无';
        const endDisplay = shop.endDate ? shop.endDate.replace(/-/g, '/') : '无';
        return `
          <div class="member-item" style="cursor:pointer;${isSelected ? 'border:2px solid var(--secondary);' : ''}" onclick="selectShopForAdmin('${shop.id}')">
            <div class="avatar" style="background:${isSelected ? 'var(--secondary)' : 'var(--primary)'};">${shop.name.charAt(0)}</div>
            <div class="info" style="flex:1;">
              <div class="name">${shop.name} <span style="font-size:11px;${statusClass}">[${statusText}]</span></div>
              <div class="phone">有效期: ${startDisplay} ~ ${endDisplay}</div>
              <div class="phone">参与人员: ${shop.members ? shop.members.length : 0}人</div>
            </div>

    // 日期输入框实时同步到门店数据（支持手动输入）
    function onShopDateInput(input) {
      let value = input.value.trim();
      
      // 自动格式化：用户输入 20260601 -> 2026-06-01
      if (/^\d{8}$/.test(value)) {
        value = value.substring(0, 4) + '-' + value.substring(4, 6) + '-' + value.substring(6, 8);
        input.value = value;
      }
      
      // 验证格式 YYYY-MM-DD
      if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(value)) {
        const parts = value.split('-');
        const dateStr = parts[0] + '-' + parts[1].padStart(2, '0') + '-' + parts[2].padStart(2, '0');
        const date = new Date(dateStr);
        if (!isNaN(date.getTime())) {
          input.value = dateStr;
          onShopDateChange();
        }
      }
    }

    function onShopDateChange() {
      if (!state.adminShopId) return;
      const shop = state.shops.find(s => s.id === state.adminShopId);
      if (!shop) return;
      
      shop.startDate = document.getElementById('newShopStartDate').value || null;
      shop.endDate = document.getElementById('newShopEndDate').value || null;
      saveData();
      renderShopList();
    }
    
    // 门店名称实时同步
    function onShopNameChange() {
      if (!state.adminShopId) return;
      const shop = state.shops.find(s => s.id === state.adminShopId);
      if (!shop) return;
      
      shop.name = document.getElementById('newShopName').value.trim() || shop.name;
      document.getElementById('currentShopLabel').textContent = `当前: ${shop.name}`;
      saveData();

    function addShop() {
      const name = document.getElementById('newShopName').value.trim();
      const startDate = document.getElementById('newShopStartDate').value;
      const endDate = document.getElementById('newShopEndDate').value;
      
      if (!name) {
        showToast('请输入门店名称', 'error');
        return;
      }
      
      // 如果已选中门店，则更新它
      if (state.adminShopId) {
        const shop = state.shops.find(s => s.id === state.adminShopId);
        if (shop) {
          shop.name = name;
          shop.startDate = startDate || null;
          shop.endDate = endDate || null;
          saveData();
          renderShopList();
          showToast('门店信息已更新', 'success');
          return;
        }
      }
      
      // 创建新门店
      const newShop = {
        id: 'shop_' + Date.now(),
        name: name,
        startDate: startDate || null,
        endDate: endDate || null,
        members: [],
        createdAt: new Date().toISOString()
      };
      
      state.shops.push(newShop);
      state.adminShopId = newShop.id;
      saveData();
      renderShopList();
      showToast('门店添加成功', 'success');
    }

    function deleteShop(shopId) {
      if (!confirm('确定要删除该门店吗？删除后无法恢复！')) return;
      state.shops = state.shops.filter(s => s.id !== shopId);
      if (state.adminShopId === shopId) {
        state.adminShopId = null;
      }
      saveData();
      renderShopList();
      showToast('门店已删除', 'success');
