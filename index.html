<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>积分统计系统</title>
  <style>
    :root {
      --primary: #1a365d;
      --primary-light: #2d4a7c;
      --secondary: #d4a574;
      --secondary-light: #e8c9a8;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --success: #10b981;
      --error: #ef4444;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --shadow: 0 4px 20px rgba(26, 54, 93, 0.1);
      --shadow-hover: 0 8px 30px rgba(26, 54, 93, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes shine {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .page { display: none; animation: fadeIn 0.4s ease-out; }
    .page.active { display: block; }

    /* 登录页 */
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-hover);
      animation: slideUp 0.6s ease-out;
    }

    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    .login-logo p { color: var(--text-secondary); font-size: 14px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 8px; }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
    }

    .code-input-group { display: flex; gap: 12px; }
    .code-input-group input { flex: 1; }

    .code-btn {
      padding: 14px 20px;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .code-btn:hover { background: var(--secondary-light); color: var(--primary); }
    .code-btn:disabled { background: #d1d5db; cursor: not-allowed; }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26, 54, 93, 0.3); }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }

    /* 主应用 */
    .app-container { min-height: 100vh; padding-bottom: 100px; }

    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      padding: 20px;
      color: white;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-info { display: flex; align-items: center; gap: 12px; }

    .user-avatar {
      width: 44px;
      height: 44px;
      background: var(--secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
    }

    .user-details h3 { font-size: 16px; font-weight: 600; }
    .user-details p { font-size: 12px; opacity: 0.8; }

    .header-actions { display: flex; gap: 8px; }

    .header-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .header-btn:hover { background: rgba(255,255,255,0.3); }

    /* 标题区域 */
    .title-section {
      text-align: center;
      margin-bottom: 16px;
      position: relative;
    }

    .main-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: color 0.2s;
    }

    .main-title:hover {
      color: var(--secondary);
    }

    .title-input {
      width: 100%;
      max-width: 300px;
      padding: 10px 16px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--secondary);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: white;
    }

    /* 积分排行榜 */
    .ranking-section {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .ranking-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .ranking-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      max-height: 280px;
      overflow-y: auto;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 20px;
      font-size: 13px;
    }

    /* 冠军样式 */
    .ranking-item.champion {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
      color: #fff;
      border: 2px solid #FFD700;
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
      width: 100%;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .ranking-item.champion.current {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.5);
    }

    .ranking-item.champion .champion-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ranking-item.champion .champion-icon {
      font-size: 22px;
      animation: pulse 2s ease-in-out infinite;
    }

    .ranking-item.champion .champion-label {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .ranking-item.champion .rank {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .ranking-item.champion .champion-points {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* 亚军样式 */
    .ranking-item.runner-up {
      background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
      color: #fff;
      border: 2px solid #C0C0C0;
      box-shadow: 0 3px 10px rgba(192, 192, 192, 0.25);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .ranking-item.runner-up.current {
      box-shadow: 0 3px 10px rgba(192, 192, 192, 0.4);
    }

    .ranking-item.runner-up .runner-up-icon {
      font-size: 18px;
    }

    .ranking-item.runner-up .runner-up-label {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .ranking-item.runner-up .name,
    .ranking-item.runner-up .points {
      color: #fff;
    }

    /* 季军样式 */
    .ranking-item.third-place {
      background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%);
      color: #fff;
      border: 2px solid #CD7F32;
      box-shadow: 0 3px 10px rgba(205, 127, 50, 0.25);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .ranking-item.third-place.current {
      box-shadow: 0 3px 10px rgba(205, 127, 50, 0.4);
    }

    .ranking-item.third-place .third-place-icon {
      font-size: 18px;
    }

    .ranking-item.third-place .third-place-label {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .ranking-item.third-place .name,
    .ranking-item.third-place .points {
      color: #fff;
    }

    /* 其他排名样式 */
    .ranking-item.other-rank {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border: 1px solid #dee2e6;
      padding: 8px 14px;
    }

    .ranking-item.other-rank.current {
      border: 2px solid var(--secondary);
      background: rgba(212, 165, 116, 0.15);
    }

    .ranking-item.other-rank .other-rank-label {
      font-weight: 700;
      color: #6c757d;
      min-width: 50px;
    }

    .ranking-item.current .other-rank-label {
      color: var(--secondary);
    }

    .ranking-item .rank {
      font-weight: 700;
      min-width: 20px;
      color: var(--text-secondary);
    }

    .ranking-item .name {
      font-weight: 500;
      color: var(--text);
    }

    .ranking-item .points {
      font-weight: 700;
      color: var(--secondary);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* 总积分展示 */
    .total-banner {
      background: linear-gradient(135deg, var(--secondary) 0%, #c49660 100%);
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .total-banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shine 3s linear infinite;
    }

    .total-banner .label { font-size: 13px; opacity: 0.9; margin-bottom: 4px; }
    .total-banner .value { font-size: 36px; font-weight: 700; }
    .total-banner .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }

    /* 段标签 */
    .section-tabs {
      display: flex;
      background: var(--card-bg);
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .section-tab {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .section-tab.active {
      color: var(--primary);
      border-bottom-color: var(--secondary);
      font-weight: 600;
    }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* 表格样式 */
    .points-table {
      width: 100%;
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border-collapse: collapse;
    }

    .points-table th,
    .points-table td {
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      border: 1px solid #e5e7eb;
    }

    .points-table th {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      font-weight: 600;
      font-size: 12px;
    }

    .points-table th .sub {
      display: block;
      font-size: 10px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 2px;
    }

    .points-table tr.header-row td {
      background: #f3f4f6;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
    }

    .points-table tr.day-row td {
      background: rgba(26, 54, 93, 0.05);
      color: var(--primary);
      font-weight: 600;
    }

    .points-table td.name {
      text-align: left;
      font-weight: 500;
      background: rgba(212, 165, 116, 0.05);
    }

    .points-table td.current-user {
      background: rgba(212, 165, 116, 0.15);
      font-weight: 600;
    }

    .points-table td.total {
      background: var(--primary);
      color: white;
      font-weight: 700;
    }

    .points-table input {
      width: 60px;
      padding: 6px 4px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      outline: none;
    }

    .points-table input:focus { border-color: var(--secondary); }

    .points-table .value-cell { color: var(--text-secondary); font-size: 12px; }

    .day-separator {
      background: var(--primary);
      color: white;
      font-weight: 600;
      text-align: left !important;
      padding: 8px 12px !important;
      font-size: 13px;
    }

    /* 双栏布局 */
    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .column-card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .column-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }

    .column-header.gold { background: linear-gradient(135deg, var(--secondary) 0%, #c49660 100%); }

    .column-content { padding: 12px; }

    /* 目标达成表格 */
    .target-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .target-table th,
    .target-table td {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid #f3f4f6;
    }

    .target-table th {
      background: #f9fafb;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 11px;
    }

    .target-table td { color: var(--text); font-size: 13px; }
    .target-table td:last-child { font-weight: 600; }

    .target-table .rate { color: var(--secondary); font-weight: 700; }
    .target-table .rate.low { color: var(--error); }
    .target-table .rate.mid { color: #f59e0b; }
    .target-table .rate.high { color: var(--success); }

    .target-table input {
      width: 50px;
      padding: 4px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }

    .target-table input:focus { border-color: var(--secondary); outline: none; }
    .target-table input:read-only { background: #f3f4f6; color: var(--text-secondary); border-color: transparent; }

    /* 周数据填写 */
    .week-data-section {
      margin-top: 16px;
    }

    .week-data-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .week-data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .week-data-table th {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: var(--text-secondary);
      font-weight: 600;
      padding: 10px 6px;
      text-align: center;
      font-size: 11px;
      border-bottom: 2px solid #dee2e6;
    }

    .week-data-table th:first-child {
      text-align: left;
      padding-left: 12px;
    }

    .week-data-table td {
      padding: 10px 6px;
      text-align: center;
      border-bottom: 1px solid #f1f3f4;
      font-size: 13px;
    }

    .week-data-table td:first-child {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      padding-left: 12px;
      background: #fafbfc;
    }

    .week-data-table tr:last-child td {
      border-bottom: none;
    }

    .week-data-table tr:hover td {
      background: #f8f9fa;
    }

    .week-data-table tr:hover td:first-child {
      background: #f0f4f8;
    }

    .week-data-table input {
      width: 38px;
      padding: 6px 4px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      background: #fff;
      transition: all 0.2s;
    }

    .week-data-table input:hover {
      border-color: #c49660;
    }

    .week-data-table input:focus {
      border-color: var(--secondary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.2);
    }

    /* 隐藏数字输入框的上下箭头 */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }

    .week-data-total {
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-around;
      font-size: 12px;
      border: 1px solid #e9ecef;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .week-data-total .item {
      text-align: center;
      padding: 8px 16px;
      border-radius: 8px;
      background: white;
      min-width: 70px;
    }

    .week-data-total .label {
      color: var(--text-secondary);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .week-data-total .value {
      font-weight: 700;
      color: var(--secondary);
      font-size: 18px;
    }

    .team-summary-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px dashed rgba(212, 165, 116, 0.3);
    }

    /* 累计积分 */
    .total-points-section {
      background: linear-gradient(135deg, rgba(26, 54, 93, 0.1) 0%, rgba(212, 165, 116, 0.1) 100%);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(212, 165, 116, 0.3);
    }

    .total-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .total-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--secondary);
    }

    /* 周积分统计表格 */
    .week-points-section {
      margin-bottom: 16px;
    }

    .week-points-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .week-points-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .week-points-table th {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: var(--text-secondary);
      font-weight: 600;
      padding: 8px 4px;
      text-align: center;
      font-size: 10px;
      border-bottom: 2px solid #dee2e6;
    }

    .week-points-table th:first-child {
      text-align: left;
      padding-left: 8px;
    }

    .week-points-table td {
      padding: 8px 4px;
      text-align: center;
      border-bottom: 1px solid #f1f3f4;
      font-size: 11px;
    }

    .week-points-table td.item-name {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      padding-left: 8px;
      background: #fafbfc;
    }

    .week-points-table td.total {
      font-weight: 700;
      color: var(--secondary);
      background: rgba(212, 165, 116, 0.1);
    }

    .week-points-table tr:last-child td {
      border-bottom: none;
    }

    /* 积分小表格 */
    .mini-points-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .mini-points-table th,
    .mini-points-table td {
      padding: 8px 4px;
      text-align: center;
      border-bottom: 1px solid #f3f4f6;
    }

    .mini-points-table th {
      background: #f9fafb;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 11px;
    }

    .mini-points-table td { color: var(--text); }
    .mini-points-table td:first-child { text-align: left; font-weight: 500; }
    .mini-points-table td.rule { font-size: 10px; color: var(--text-secondary); }
    .mini-points-table td.points-cell { font-weight: 600; color: var(--secondary); }

    .mini-points-table input {
      width: 45px;
      padding: 4px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      font-size: 11px;
      text-align: center;
    }

    .mini-points-table input:focus { border-color: var(--secondary); outline: none; }
    .mini-points-table input:disabled { background: #f3f4f6; color: var(--text-secondary); }

    .section-highlight {

<body>
  <div id="toast" class="toast"></div>

    // 积分配置
    const ELEMENTS = [
      { type: 'call', name: '呼出', unit: '个', rule: '1分/个', pointsPerUnit: 1 },
      { type: 'mass', name: '群发', unit: '个', rule: '1分/10个', pointsPerUnit: 0.1, maxPoints: 50 },

            const dateStr = day.toISOString().split('T')[0];

    // 生成周数据输入框
    function generateWeekInputs(type, isAdmin) {
      const now = new Date();
      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let html = '';
      for (let i = 0; i < 7; i++) {
        const day = new Date(monday);
        day.setDate(monday.getDate() + i);

        const isPast = day < today;
        const isToday = day.getTime() === today.getTime();
        const isFuture = day > today;

        let disabled = '';
        if (isFuture) {
          disabled = 'disabled';
        } else if (isPast && !isAdmin) {
          disabled = 'disabled';
        }

        const inputId = `week${type.charAt(0).toUpperCase() + type.slice(1)}${i + 1}`;
        html += `<td><input type="number" id="${inputId}" min="0" ${disabled} onchange="updateWeekData('${type}', ${i}, this.value)"></td>`;
      }
      return html;
    }

        for (let i = 0; i < 7; i++) {

          day.setDate(monday.getDate() + i);

      );

      // 计算总积分

      const now = new Date();

      monday.setDate(now.getDate() - (dayOfWeek - 1));

      // 计算本周每天的各项目数据
      const weekData = {};
      weekElementTypes.forEach(type => {
        weekData[type] = [];
        for (let i = 0; i < 7; i++) {
          const day = new Date(monday);
          day.setDate(monday.getDate() + i);
          const dayStr = day.toDateString();
          const dayRecords = state.records.filter(r =>
            r.userId === state.currentUser.id &&
            new Date(r.date).toDateString() === dayStr &&
            r.elementType === type
          );
          weekData[type].push(dayRecords.reduce((sum, r) => sum + r.value, 0));
        }
      });

      // 计算每个项目的周合计
      const weekTotals = {};
      weekElementTypes.forEach(type => {

        // 根据配置计算积分

        } else {
          // 1分/X个 格式：每X个得1分
          points = Math.round(value * el.pointsPerUnit);
        }
        
        // 如果有上限
        if (el.maxPoints && el.maxPoints > 0) {
          points = Math.min(points, el.maxPoints);
        }

        // 生成规则显示文本
        let ruleText = '';
        if (el.pointsPerUnit >= 1) {
          ruleText = `${el.pointsPerUnit}分/${el.unit}`;
        } else {
          ruleText = `${el.pointsPerUnit}分/${el.unit}`;
        }
        if (el.maxPoints && el.maxPoints > 0) {
          ruleText += ` (上限${el.maxPoints}分)`;
        }

        html += `
          <tr>
            <td>${el.name}</td>
            <td class="rule">${ruleText}</td>
            <td><input type="number" data-type="${el.type}" placeholder="0" min="0" value="${val}" oninput="onPointsChange('${el.type}', this.value)"></td>
            <td class="points-cell">+${points}</td>
          </tr>
        `;
      });

      html += `
            </tbody>
          </table>
          <div class="target-summary">
            <div class="label">今日已得积分</div>
            <div class="value achieved">+${totalTodayPoints}</div>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function onPointsChange(type, value) {
      state.values[type] = value;
      renderPointsColumn();
      updateSubmitBtn();
    }

    function updateSubmitBtn() {
      let total = 0;
      const rules = state.rules || ELEMENTS;
      rules.forEach(el => {
        const value = parseInt(state.values[el.type]) || 0;
        if (value <= 0) return;
        
        let points = 0;
        // 根据配置计算积分
        if (el.pointsPerUnit > 1) {
          points = Math.floor(value / el.pointsPerUnit);
        } else {
          points = Math.round(value * el.pointsPerUnit);
        }
        // 如果有上限
        if (el.maxPoints && el.maxPoints > 0) {
          points = Math.min(points, el.maxPoints);
        }
        total += points;
      });

      const btn = document.getElementById('submitBtn');
      btn.disabled = total === 0;
      btn.querySelector('.total').textContent = '+' + total + ' 积分';
    }

    // 提交
    function submitAll() {
      const today = new Date().toDateString();
      const todayRecords = state.records.filter(r =>
        r.userId === state.currentUser.id && new Date(r.date).toDateString() === today
      );

      let totalPoints = 0;
      const rules = state.rules || ELEMENTS;
      rules.forEach(el => {
        const value = parseInt(state.values[el.type]) || 0;
        if (value <= 0) return;
        
        let points = 0;
        // 根据配置计算积分
        if (el.pointsPerUnit > 1) {
          points = Math.floor(value / el.pointsPerUnit);
        } else {
          points = Math.round(value * el.pointsPerUnit);
        }
        // 如果有上限
        if (el.maxPoints && el.maxPoints > 0) {
          points = Math.min(points, el.maxPoints);
        }
        
        if (points > 0) {
          const record = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
            userId: state.currentUser.id,
            elementType: el.type,
            value: value,
            points: points,
            date: new Date().toISOString()
          };
          state.records.push(record);
          totalPoints += points;
        }
      });

      if (totalPoints > 0) {
        saveData();
        showToast('提交成功 +' + totalPoints + ' 积分', 'success');
        state.values = {};
        renderTeamSummaryColumn();
        renderTargetColumn();
        renderPointsColumn();
        updateBanner();
      }
    }

    // 更新顶部 banner
    function updateBanner() {
      if (!state.currentUser) return;

      // 计算所有用户的积分
      const userPoints = {};
      state.users.forEach(u => {
        userPoints[u.id] = state.records
          .filter(r => r.userId === u.id)
          .reduce((sum, r) => sum + r.points, 0);
      });

      // 按积分排序
      const sorted = [...state.users]
        .map(u => ({ ...u, points: userPoints[u.id] || 0 }))
        .sort((a, b) => b.points - a.points);

      // 渲染排行榜
      const rankingList = document.getElementById('rankingList');
      if (rankingList && sorted.length > 0) {
        let html = '';

        // 冠军（第一名）
        if (sorted[0]) {
          const champion = sorted[0];
          const championClass = champion.id === state.currentUser.id ? 'champion current' : 'champion';
          html += `
            <div class="ranking-item ${championClass}">
              <div class="champion-header">
                <span class="champion-icon">🏆</span>
                <span class="champion-label">冠军</span>
              </div>
              <span class="rank">${champion.name}</span>
              <span class="champion-points">${champion.points}</span>
            </div>
          `;
        }

        // 亚军（第二名）
        if (sorted[1]) {
          const runnerUp = sorted[1];
          const runnerUpClass = runnerUp.id === state.currentUser.id ? 'runner-up current' : 'runner-up';
          html += `
            <div class="ranking-item ${runnerUpClass}">
              <span class="runner-up-icon">🥈</span>
              <span class="runner-up-label">亚军</span>
              <span class="name">${runnerUp.name}</span>
              <span class="points">${runnerUp.points}</span>
            </div>
          `;
        }

        // 季军（第三名）
        if (sorted[2]) {
          const third = sorted[2];
          const thirdClass = third.id === state.currentUser.id ? 'third-place current' : 'third-place';
          html += `
            <div class="ranking-item ${thirdClass}">
              <span class="third-place-icon">🥉</span>
              <span class="third-place-label">季军</span>
              <span class="name">${third.name}</span>
              <span class="points">${third.points}</span>
            </div>
          `;
        }

        // 其他排名（第4名及以后）
        for (let i = 3; i < sorted.length; i++) {
          const user = sorted[i];
          const rank = i + 1;
          const otherClass = user.id === state.currentUser.id ? 'other-rank current' : 'other-rank';
          html += `
            <div class="ranking-item ${otherClass}">
              <span class="other-rank-label">第${rank}名</span>
              <span class="name">${user.name}</span>
              <span class="points">${user.points}</span>
            </div>
          `;
        }

        rankingList.innerHTML = html;
      }
    }

    // 验证登录
    function verifyLogin() {
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      if (!phone || phone.length !== 11) {
        showToast('请输入正确的手机号', 'error');
        return;
      }

      if (!password) {
        showToast('请输入密码', 'error');
        return;
      }

      if (password !== '123456') {
        showToast('密码错误', 'error');
        return;
      }

      // 检查是否已注册
      const existingUser = state.users.find(u => u.phone === phone);
      if (existingUser) {
        // 只有手机号 13829218486 是管理员
        existingUser.isAdmin = (phone === '13829218486');
        state.currentUser = existingUser;
        localStorage.setItem('point_current_user', JSON.stringify(existingUser));
        showToast('登录成功', 'success');
        showApp();
        return;
      }

      // 检查是否在预注册列表中
      const preRegistered = state.users.find(u => u.phone === phone && !u.registered);
      if (preRegistered) {
        // 预注册用户，直接激活
        preRegistered.registered = true;
        preRegistered.isAdmin = (phone === '13829218486');
        state.currentUser = preRegistered;
        saveData();
        localStorage.setItem('point_current_user', JSON.stringify(preRegistered));
        showToast('激活成功', 'success');
        showApp();
        return;
      }

      // 新用户，需要填写姓名
      state.pendingPhone = phone;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      showToast('验证成功，请填写姓名', 'success');
    }

    function completeRegister() {
      const name = document.getElementById('realName').value.trim();
      if (!name) {
        showToast('请输入真实姓名', 'error');
        return;
      }
      const newUser = {
        id: Date.now().toString(),
        phone: state.pendingPhone,
        name: name,
        createdAt: new Date().toISOString()
      };
      state.users.push(newUser);
      state.currentUser = newUser;
      saveData();
      localStorage.setItem('point_current_user', JSON.stringify(newUser));
      showToast('注册成功', 'success');
      showApp();
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function openAdminModal() {
      renderMemberList();
      renderTargetSettings();
      renderRulesSettings();
      document.getElementById('adminModal').classList.add('show');
    }

    function closeAdminModal() {
      document.getElementById('adminModal').classList.remove('show');
    }

    // 打开扫码参与弹窗
    function openQRModal() {
      const container = document.getElementById('qrImageContainer');
      const urlText = document.getElementById('qrUrlText');

      // 获取当前页面URL
      const pageUrl = window.location.href;

      // 使用公共二维码服务生成二维码图片
      const qrSize = 300;
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&data=${encodeURIComponent(pageUrl)}`;

      container.innerHTML = `<img src="${qrImageUrl}" alt="参与二维码" style="width: ${qrSize}px; height: ${qrSize}px; display: block;">`;
      urlText.textContent = pageUrl;

      document.getElementById('qrModal').classList.add('show');
    }

    // 关闭扫码参与弹窗
    function closeQRModal() {
      document.getElementById('qrModal').classList.remove('show');
    }

    // 复制链接到剪贴板
    function copyQRUrl() {
      const pageUrl = window.location.href;
      const tempInput = document.createElement('textarea');
      tempInput.value = pageUrl;
      document.body.appendChild(tempInput);
      tempInput.select();
      try {
        document.execCommand('copy');
        showToast('链接已复制，可以分享给其他成员', 'success');
      } catch (err) {
        showToast('复制失败，请手动复制', 'error');
      }
      document.body.removeChild(tempInput);
    }

    function renderMemberList() {
      const list = document.getElementById('memberList');
      document.getElementById('memberCount').textContent = state.users.length;
      if (state.users.length === 0) {
        list.innerHTML = '<div class="empty-members">暂无成员，请添加</div>';
        return;
      }
      list.innerHTML = state.users.map(user => {
        const targets = getUserTargets(user.id);
        return `
        <div class="member-item">
          <div class="avatar">${user.name.charAt(0)}</div>
          <div class="info">
            <div class="name">${user.name}</div>
            <div class="phone">${user.phone}</div>
            <div class="targets" style="font-size:11px;color:#6b7280;margin-top:4px;">
              目标: 订单${targets.orderTarget} 邀约${targets.inviteTarget} 门票${targets.ticketTarget}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteMember('${user.id}')">×</button>
        </div>
      `;
      }).join('');
    }

    // 渲染目标设置区域
    function renderTargetSettings() {
      const container = document.getElementById('targetSettings');
      const nonAdminUsers = state.users.filter(u => !(u.name === '成林涛' && u.phone === '13829218486'));

      if (nonAdminUsers.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无成员，请先添加成员</div>';
        return;
      }

      let html = '<div class="target-settings-list">';

      nonAdminUsers.forEach(user => {
        const targets = getUserTargets(user.id);
        html += `
          <div class="target-settings-item">
            <div class="user-name">${user.name}</div>
            <div class="target-inputs">
              <div class="target-input-group">
                <label>订单目标</label>
                <input type="number" min="0" value="${targets.orderTarget || ''}" 
                  onchange="updateMemberTarget('${user.id}', 'orderTarget', this.value)">
              </div>
              <div class="target-input-group">
                <label>邀约目标</label>
                <input type="number" min="0" value="${targets.inviteTarget || ''}" 
                  onchange="updateMemberTarget('${user.id}', 'inviteTarget', this.value)">
              </div>
              <div class="target-input-group">
                <label>门票目标</label>
                <input type="number" min="0" value="${targets.ticketTarget || ''}" 
                  onchange="updateMemberTarget('${user.id}', 'ticketTarget', this.value)">
              </div>
            </div>
          </div>
        `;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    // 渲染积分规则配置
    function renderRulesSettings() {
      const container = document.getElementById('rulesSettings');

      let html = '<div class="rules-settings-list">';
      html += '<div class="rules-settings-info" style="font-size:11px;color:#6b7280;margin-bottom:10px;">示例：1分/个 表示每1个得1分，50分/批 表示每批得50分</div>';

      state.rules.forEach((rule, index) => {
        // 计算显示格式：如果 pointsPerUnit >= 1，则是 X分/Y个；如果是小数如0.1，则是 1分/10个
        let displayPoints, displayDivisor;
        if (rule.pointsPerUnit >= 1) {
          displayPoints = rule.pointsPerUnit;
          displayDivisor = 1;
        } else {
          displayPoints = 1;
          displayDivisor = Math.round(1 / rule.pointsPerUnit);
        }

        html += `
          <div class="rule-settings-item">
            <div class="rule-settings-header">
              <input type="text" class="rule-name-input" value="${rule.name}" 
                placeholder="项目名称" onchange="updateRuleName(${index}, this.value)">
              <button class="rule-delete-btn" onclick="deleteRule(${index})">🗑️</button>
            </div>
            <div class="rule-settings-body">
              <div class="rule-input-row">
                <input type="number" min="1" value="${displayPoints}" class="rule-points-input"
                  onchange="updateRulePoints(${index}, this.value, ${displayDivisor})">
                <span class="rule-label">分/</span>
                <input type="number" min="1" value="${displayDivisor}" class="rule-unit-qty-input"
                  onchange="updateRulePoints(${index}, ${displayPoints}, this.value)">
                <input type="text" value="${rule.unit}" class="rule-unit-input" 
                  placeholder="个/批/人" onchange="updateRuleUnit(${index}, this.value)">
              </div>
              <div class="rule-preview">预览：${displayPoints}分/${displayDivisor}${rule.unit}</div>
            </div>
          </div>
        `;
      });

      html += `
        <button class="add-rule-btn" onclick="addNewRule()">➕ 添加新项目</button>
      `;
      html += '</div>';
      container.innerHTML = html;
    }

    // 更新项目名称
    function updateRuleName(index, value) {
      state.rules[index].name = value;
      saveRules();
      renderRulesSettings();
    }

    // 更新积分规则（点数和除数）
    function updateRulePoints(index, points, divisor) {
      const pointsVal = parseFloat(points) || 1;
      const divisorVal = parseInt(divisor) || 1;
      state.rules[index].pointsPerUnit = pointsVal / divisorVal;
      saveRules();
      renderRulesSettings();
      showToast('规则已更新', 'success');
      if (document.getElementById('pointsColumn')) {
        renderPointsColumn();
      }
    }

    // 更新单位
    function updateRuleUnit(index, value) {
      state.rules[index].unit = value;
      saveRules();
      renderRulesSettings();
    }

    // 添加新规则
    function addNewRule() {
      const newRule = {
        type: 'custom_' + Date.now(),
        name: '新项目',
        unit: '个',
        pointsPerUnit: 1,
        maxPoints: 0
      };
      state.rules.push(newRule);
      saveRules();
      renderRulesSettings();
      showToast('已添加新项目', 'success');
    }

    // 删除规则
    function deleteRule(index) {
      if (state.rules.length <= 1) {
        showToast('至少保留一个项目', 'error');
        return;
      }
      state.rules.splice(index, 1);
      saveRules();
      renderRulesSettings();
      showToast('已删除项目', 'success');
      if (document.getElementById('pointsColumn')) {
        renderPointsColumn();
      }
    }

    // 更新成员目标
    function updateMemberTarget(userId, targetType, value) {
      const targets = getUserTargets(userId);
      targets[targetType] = parseInt(value) || 0;
      saveData();
      showToast('目标已更新', 'success');
      renderTeamSummaryColumn();
      renderTargetColumn();
      renderMemberList();
    }

    // 导出数据
    function exportData(type) {
      const now = new Date();
      const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dayOfWeek - 1));
      monday.setHours(0, 0, 0, 0);

      let csvContent = '';

      if (type === 'week') {
        // 本周数据
        const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        csvContent = '姓名,类型,' + weekDays.join(',') + ',合计\n';

        state.users.forEach(user => {
          if (user.name === '成林涛' && user.phone === '13829218486') return;

          ['订单', '邀约', '门票'].forEach(itemType => {
            const typeKey = itemType === '订单' ? 'order' : itemType === '邀约' ? 'invite' : 'ticket';
            const values = [];
            let total = 0;

            for (let i = 0; i < 7; i++) {
              const day = new Date(monday);
              day.setDate(monday.getDate() + i);
              const dateStr = day.toISOString().split('T')[0];
              const key = `week_${user.id}_${typeKey}_${dateStr}`;
              const val = parseInt(localStorage.getItem(key)) || 0;
              values.push(val);
              total += val;
            }

            csvContent += `${user.name},${itemType},` + values.join(',') + `,${total}\n`;
          });
        });
      } else {
        // 全部数据 - 积分记录
        csvContent = '日期,时间,姓名,项目,数量,积分\n';

        state.records.forEach(record => {
          const user = state.users.find(u => u.id === record.userId);
          const userName = user ? user.name : '未知';
          const date = new Date(record.date);
          const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
          const timeStr = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
          const rules = state.rules || ELEMENTS;
          const element = rules.find(el => el.type === record.elementType);
          const elementName = element ? element.name : record.elementType;

          csvContent += `${dateStr},${timeStr},${userName},${elementName},${record.value},${record.points}\n`;
        });

        // 添加目标达成数据
        csvContent += '\n目标达成数据\n';
        csvContent += '姓名,类型,目标,达成,达成率\n';
        state.users.forEach(user => {
          if (user.name === '成林涛' && user.phone === '13829218486') return;
          const targets = getUserTargets(user.id);
          ['订单', '邀约', '门票'].forEach(itemType => {
            const targetKey = itemType === '订单' ? 'orderTarget' : itemType === '邀约' ? 'inviteTarget' : 'ticketTarget';
            const achieveKey = itemType === '订单' ? 'orderAchieve' : itemType === '邀约' ? 'inviteAchieve' : 'ticketAchieve';
            const target = targets[targetKey] || 0;
            const achieve = targets[achieveKey] || 0;
            const rate = target > 0 ? Math.round((achieve / target) * 100) + '%' : '-';
            csvContent += `${user.name},${itemType},${target},${achieve},${rate}\n`;
          });
        });
      }

      // 下载文件
      const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      const fileName = type === 'week'
        ? `本周数据_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}.csv`
        : `全部数据_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}.csv`;
      link.setAttribute('download', fileName);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      showToast('数据导出成功', 'success');
    }

    function addMember() {
      const name = document.getElementById('newMemberName').value.trim();
      const phone = document.getElementById('newMemberPhone').value.trim();
      if (!name) { showToast('请输入姓名', 'error'); return; }
      if (!phone || phone.length !== 11) { showToast('请输入正确的手机号', 'error'); return; }
      if (state.users.some(u => u.phone === phone)) { showToast('该手机号已存在', 'error'); return; }

      const newUser = {
        id: Date.now().toString(),
        phone: phone,
        name: name,
        registered: false,
        createdAt: new Date().toISOString()
      };
      state.users.push(newUser);
      // 初始化目标数据
      state.targets[newUser.id] = {
        orderTarget: 0,
        inviteTarget: 0,
        ticketTarget: 0,
        orderAchieve: 0,
        inviteAchieve: 0,
        ticketAchieve: 0
      };
      saveData();
      document.getElementById('newMemberName').value = '';
      document.getElementById('newMemberPhone').value = '';
      renderMemberList();
      showToast('添加成功', 'success');
    }

    function deleteMember(userId) {
      if (!confirm('确定要删除该成员吗？')) return;
      state.users = state.users.filter(u => u.id !== userId);
      state.records = state.records.filter(r => r.userId !== userId);
      delete state.targets[userId];
      saveData();
      if (state.currentUser && state.currentUser.id === userId) {
        state.currentUser = null;
        localStorage.removeItem('point_current_user');
        closeAdminModal();
        showLogin();
        return;
      }
      renderMemberList();
      updateBanner();
      showToast('删除成功', 'success');
    }

    init();
  </script>
</body>
</html>
